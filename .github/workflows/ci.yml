name: CI

# Release gate: runs on pushes to main and on pull requests. Fails closed — no step is
# allowed to be skipped or weakened to obtain a green result.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs for the same ref so only the latest matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is Raspberry Pi OS Trixie's interpreter (the deployment target); 3.11 retained for
        # Bookworm compatibility. 3.12 kept as the in-between.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # Third-party actions are pinned to immutable commit SHAs (never floating tags).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest ruff bandit pip-audit

      - name: Byte-compile production code
        run: python -m compileall -q lhpc

      - name: Shell-syntax check installer + bootstrap scripts
        run: bash -n install.sh uninstall.sh bootstrap-deps.sh

      - name: Ruff (production code, default rules)
        run: ruff check lhpc

      - name: Ruff (tests — fatal errors only)
        run: ruff check tests --select F,E9

      - name: Tests
        run: pytest -q

      - name: Bandit (high severity gate)
        run: bandit -q -r lhpc -lll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit . --strict --progress-spinner=off

  # Authoritative CROSS-REPOSITORY pin gate. Catches BOTH orphaned-pin classes: a pin that predates a
  # referenced script, AND a once-valid SHA orphaned by force-pushing/amending the source branch (no
  # longer an ancestor of the remote branch tip). Read-only, immutable action SHAs, no persisted creds.
  pin-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout controller
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"

      - name: Parse the managed-source pin contract (asserts both consumers agree)
        run: python tools/manifest_pin.py src/meshcom-qemu-raspi | tee -a "$GITHUB_ENV"

      - name: Validate the pin against the live source branch
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          test -n "${PIN:-}" && test -n "${REMOTE:-}" && test -n "${BRANCH:-}" && test -n "${SCRIPTS:-}"
          echo "validating ${CONSUMERS} consumer(s): PIN=${PIN} on ${REMOTE} (${BRANCH})"
          git init -q ext
          git -C ext remote add origin "$REMOTE"
          # FULL fetch of the source branch. An ORPHANED pin (force-push/amend) is not reachable, so the
          # object resolution below HARD-FAILS — exactly the 56dc877 -> amend signature.
          git -C ext fetch --no-tags origin "$BRANCH"
          git -C ext cat-file -e "${PIN}^{commit}"
          git -C ext merge-base --is-ancestor "$PIN" "origin/${BRANCH}"
          git -C ext checkout -q "$PIN"
          # Every referenced script must exist AT the pinned commit; fail if we validated zero.
          n=0
          for s in $SCRIPTS; do
            test -f "ext/$s" || { echo "::error::referenced script missing at ${PIN}: $s"; exit 1; }
            n=$((n + 1))
          done
          test "$n" -gt 0 || { echo "::error::zero referenced scripts validated"; exit 1; }
          # Managed PIO + runtime-owned PLATFORMIO_CORE_DIR contract in the pinned build scripts
          # (fixed-string match — the pattern contains regex metacharacters).
          grep -qF 'PIO="${PIO:-pio}"' ext/scripts/build.sh
          grep -qF 'PIO="${PIO:-pio}"' ext/scripts/prepare-openeth.sh
          grep -qF 'PLATFORMIO_CORE_DIR' ext/scripts/build.sh
          # Shell syntax on the referenced *.sh scripts, then the external fetch-qemu tests (the offline
          # publication cases skip without a real tarball; the mismatch/symlink/cleanup cases run).
          for s in $SCRIPTS; do case "$s" in *.sh) bash -n "ext/$s" ;; esac; done
          bash ext/tests/test-fetch-qemu.sh
          echo "pin validation OK — ${n} script(s) present at ${PIN}, ancestor of origin/${BRANCH}"

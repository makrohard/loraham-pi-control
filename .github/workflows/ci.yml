name: CI

# Release gate: runs on pushes to main and on pull requests. Fails closed — no step is
# allowed to be skipped or weakened to obtain a green result.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs for the same ref so only the latest matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is Raspberry Pi OS Trixie's interpreter (the deployment target); 3.11 retained for
        # Bookworm compatibility. 3.12 kept as the in-between.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      # Third-party actions are pinned to immutable commit SHAs (never floating tags).
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest ruff bandit pip-audit

      - name: Byte-compile production code
        run: python -m compileall -q lhpc

      - name: Shell-syntax check installer + bootstrap scripts
        run: bash -n install.sh uninstall.sh bootstrap-deps.sh

      - name: Ruff (production code, default rules)
        run: ruff check lhpc

      - name: Ruff (tests — fatal errors only)
        run: ruff check tests --select F,E9

      - name: Tests
        run: pytest -q

      # The two SECURITY gates run even when the tests failed. They are the only steps ordered
      # AFTER pytest, so a single test failure used to skip them entirely and a run could go red
      # without ever reporting whether a high-severity finding or a vulnerable dependency had been
      # introduced. `!cancelled()` (not `always()`) keeps a cancelled run cancellable; the job still
      # fails overall on the pytest failure.
      - name: Bandit (high severity gate)
        if: ${{ !cancelled() }}
        run: bandit -q -r lhpc -lll

      - name: pip-audit (dependency vulnerabilities)
        if: ${{ !cancelled() }}
        run: pip-audit . --strict --progress-spinner=off

  # Authoritative CROSS-REPOSITORY pin gate. Catches BOTH orphaned-pin classes: a pin that predates a
  # referenced script, AND a once-valid SHA orphaned by force-pushing/amending the source branch (no
  # longer an ancestor of the remote branch tip). Read-only, immutable action SHAs, no persisted creds.
  pin-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout controller
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.13"

      - name: Validate EVERY pinned source against its live branch
        env:
          GIT_TERMINAL_PROMPT: "0"
        run: |
          set -euo pipefail
          # The validated set is DERIVED from the manifest: a newly pinned repo is covered the
          # moment it is added. (This job used to hardcode src/meshcom-qemu-raspi, so ten other
          # pinned repos could orphan their pin unnoticed.)
          paths=$(python tools/manifest_pin.py --list)
          test -n "$paths" || { echo "::error::no pinned sources found"; exit 1; }
          validated=0
          scripts_validated=0
          for path in $paths; do
            eval "$(python tools/manifest_pin.py --shell "$path")"
            test -n "${PIN:-}" && test -n "${REMOTE:-}" && test -n "${BRANCH:-}"
            echo "--- $path: ${CONSUMERS} consumer(s), PIN=${PIN} on ${REMOTE} (${BRANCH})"
            dir="ext/$(basename "$path")"
            rm -rf "$dir"; mkdir -p "$dir"
            git init -q "$dir"
            git -C "$dir" remote add origin "$REMOTE"
            # FULL fetch of the source branch. An ORPHANED pin (force-push/amend) is not reachable,
            # so the object resolution below HARD-FAILS — exactly the 56dc877 -> amend signature.
            git -C "$dir" fetch --no-tags origin "$BRANCH"
            git -C "$dir" cat-file -e "${PIN}^{commit}" \
              || { echo "::error::$path: pinned commit ${PIN} not found on ${BRANCH} (orphaned pin?)"; exit 1; }
            git -C "$dir" merge-base --is-ancestor "$PIN" "origin/${BRANCH}" \
              || { echo "::error::$path: pinned commit ${PIN} is not an ancestor of origin/${BRANCH}"; exit 1; }
            git -C "$dir" checkout -q "$PIN"
            # Referenced scripts are an ADDITIONAL layer — a pinned repo that references none is
            # still fully validated above (pin resolves + is an ancestor).
            for s in ${SCRIPTS:-}; do
              test -f "$dir/$s" || { echo "::error::$path: referenced script missing at ${PIN}: $s"; exit 1; }
              case "$s" in *.sh) bash -n "$dir/$s" ;; esac
              scripts_validated=$((scripts_validated + 1))
            done
            # Repo-specific contracts (managed PIO + runtime-owned PLATFORMIO_CORE_DIR, and the
            # external fetch-qemu tests) apply only to the QEMU source.
            if [ "$path" = "src/meshcom-qemu-raspi" ]; then
              grep -qF 'PIO="${PIO:-pio}"' "$dir/scripts/build.sh"
              grep -qF 'PIO="${PIO:-pio}"' "$dir/scripts/prepare-openeth.sh"
              grep -qF 'PLATFORMIO_CORE_DIR' "$dir/scripts/build.sh"
              bash "$dir/tests/test-fetch-qemu.sh"
            fi
            validated=$((validated + 1))
          done
          test "$validated" -gt 0 || { echo "::error::zero pinned sources validated"; exit 1; }
          test "$scripts_validated" -gt 0 || { echo "::error::zero referenced scripts validated"; exit 1; }
          echo "pin validation OK — ${validated} pinned source(s), ${scripts_validated} script(s)"

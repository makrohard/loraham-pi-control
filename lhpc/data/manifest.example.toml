# =====================================================================
# Stack: meshcore — MeshCore Pi node (daemon-backed, 868)
# =====================================================================
[[stack]]
id = "meshcore"
name = "MeshCore Pi (868)"
summary = "MeshCore Python node, daemon-backed on 868 (auto-starts the daemon). Optional Node Manager GUI and CLI."
main = "meshcore-pi"

  [[stack.component]]
  id = "meshcore-pi"
  readiness = "endpoint"
  # A Python node that imports its stack (scapy/crypto) before opening TCP 5000 can
  # take well over the 6 s global default to become ready — scapy's import alone can approach
  # 45 s on 512 MB / A53-class hardware, so give it a generous window so start verifies instead
  # of tearing it down. Tune down if your Pi is faster.
  readiness_timeout = 120.0
  name = "MeshCore Pi (868)"
  kind = "service"
  band = "868"
  purpose = "Async MeshCore node using the daemon on 868 (lorahaminterface)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  start_order = 1
  run = ".venv/bin/python meshcore.py {runtime}/config/files/meshcore-pi.toml"
  test = ".venv/bin/python -m pytest tests/"
  # The build_steps create the in-tree venv, THEN pip-install its deps. The venv interpreter appears
  # after the FIRST step, so `bin` alone would read "built" the moment the (still-dep-less) venv exists
  # — a build killed mid-pip would then start and die with ModuleNotFoundError. `build_marker` fixes
  # that: it is written ONLY after the LAST step succeeds and is what `is_built` gates on.
  bin = ".venv/bin/python"
  build_marker = ".venv/.lhpc-build-complete"
  # venv + pip-install of 6 packages (scapy, pycryptodome, ...) overran the 600 s default on a
  # Pi Zero 2W and was silently TERM-killed mid-pip; give the build room, and its pytest suite too.
  build_timeout = 1800.0
  test_timeout = 900.0
  # Self-sufficient managed clone: the venv is built IN-TREE by `lhpc build`. Upstream has
  # no requirements file — deps enumerated from its README (an upstream requirements.txt
  # would make this declarative).
  # This 868 node runs the DAEMON-SOCKET interface (lorahaminterface): it reaches the radio over
  # the loraham daemon's unix sockets and NEVER drives SPI/GPIO itself, so it needs NO GPIO
  # bindings and NO LoRaRF (LoRaRF is only imported by the direct-SPI `lora` interface, which this
  # deployment does not configure). Dropping LoRaRF also drops its transitive RPi.GPIO, whose sdist
  # does not build on Trixie's Python and whose classic variant is incompatible with the Pi 5's RP1
  # — so both hardware classes keep their OS defaults untouched. --system-site-packages is kept so
  # the venv can reuse any system packages present; the deps below are all pure-Python.
  build_steps = [
    { argv = ["python3", "-m", "venv", "--system-site-packages", ".venv"] },
    { argv = [".venv/bin/pip", "install", "pycryptodome", "aiotools", "pyserial_asyncio",
              "typing-extensions", "scapy==2.5.0", "pytest"], announce = "[install] Python deps (pycryptodome, scapy, …) into {source}/.venv — pip is quiet off-TTY; progress: watch {source}/.venv/lib grow" },
  ]

    # meshcore-pi has no CLI flags — all settings live in the TOML. The controller
    # generates the runtime config from the in-repo config-loraham868.toml base,
    # updating just these keys (blank = keep the base/preset default).
    [stack.component.config_file]
    path = "{runtime}/config/files/meshcore-pi.toml"
    fmt = "toml-update"
    base = "examples/config-loraham868.toml"
      [[stack.component.config_file.param]]
      name = "preset"
      key = "preset"
      section = "interface.loraham868"
      kind = "enum"
      choices = ["eu_uk_long", "eu_uk_medium", "eu_uk_narrow"]
      default = "eu_uk_narrow"
      label = "RF preset"
      [[stack.component.config_file.param]]
      name = "enable_tx"
      key = "enable_tx"
      section = "interface.loraham868"
      kind = "flag"
      default = "on"
      label = "Enable TX (off = RX-only)"
      [[stack.component.config_file.param]]
      name = "node_name"
      validator = "node"
      key = "name"
      section = "device.companion"
      kind = "str"
      default = "{callsign}"
      label = "Node name (defaults to your callsign)"
      [[stack.component.config_file.param]]
      name = "meshcore_allow"
      validator = "bind"
      key = "wifi.allow"
      section = "device.companion"
      kind = "str"
      default = "127.0.0.1"
      group = "Network exposure"
      label = "Allow-list — who may connect (127.0.0.1 = this Pi only; LAN CIDR or 0.0.0.0/0 to expose; NO auth)"
      [[stack.component.config_file.param]]
      name = "txpower"
      key = "txpower"
      section = "interface.loraham868"
      kind = "int"
      default = "14"
      min = 0
      max = 20
      label = "TX power dBm"
      advanced = true
      [[stack.component.config_file.param]]
      name = "frequency"
      key = "frequency"
      section = "interface.loraham868"
      kind = "int"
      # Blank = let the selected RF preset own the frequency (eu_uk_narrow -> 869.618 MHz, matching
      # the T-Deck MeshCore firmware). A non-blank value here is written as an explicit override and
      # would clobber the preset's frequency (e.g. forcing 869.525 onto eu_uk_narrow's 869.618, which
      # put the daemon 93 kHz off the T-Deck in a 62.5 kHz passband -> no RX either way).
      default = ""
      min = 430000000
      max = 950000000
      label = "Frequency Hz"
      advanced = true
      [[stack.component.config_file.param]]
      name = "airtime"
      key = "airtime"
      section = "interface.loraham868"
      kind = "int"
      default = "10"
      min = 0
      max = 100
      label = "Duty-cycle limit %"
      advanced = true

    [stack.component.source]
    path = "src/meshcore-pi"
    pin_commit = "3f14d3a82afecf62d2f6896b603d697761c61dc0"
    pin_tag = "3f14d3a"
    remote = "https://github.com/makrohard/meshcore-pi.git"
    branch = "loraham-daemon-interface"

    [stack.component.process]
    exec_name = "python"
    all_args = ["meshcore.py"]

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:5000"
    ready = true
    role = "listener"
    description = "MeshCore companion TCP"
    client = true
    scheme = "tcp"

    [[stack.component.resource]]
    key = "tcp.port.5000"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.868"
    kind = "daemon-socket"
    mode = "consumer"
    [[stack.component.resource]]
    key = "loraham.profile.868"
    kind = "daemon-profile"
    mode = "requirement"
    requirement = "MANAGED"

  [[stack.component]]
  id = "meshcore-nodegui"
  name = "MeshCore Node Manager (GUI)"
  kind = "service"
  purpose = "Tkinter desktop GUI (main.py); connects to the companion TCP 5000."
  tx_capable = false
  optional = true
  depends_on = ["meshcore-pi"]
  # A GUI app (not a terminal TUI) — lhpc can Start/Stop it; it opens on the Pi's
  # display (DISPLAY inherited, else :0).
  run = 'env DISPLAY="${DISPLAY:-:0}" .venv/bin/python main.py'
  run_argv = [".venv/bin/python", "main.py"]
  build_steps = [
    { argv = ["python3", "-m", "venv", ".venv"] },
    { argv = [".venv/bin/pip", "install", "-r", "requirements.txt"], announce = "[install] Python deps (requirements.txt) into {source}/.venv — pip is quiet off-TTY; progress: watch {source}/.venv/lib grow" },
  ]
  # In-tree venv interpreter is the build artifact (honest `is_built`).
  bin = ".venv/bin/python"
  run_cwd = "{source}"
  run_env = { DISPLAY = "@env:DISPLAY=:0" }
  readiness = "process"
  note = "Desktop GUI (needs a display/X server on the Pi)."
  start_note = "Connect MeshCore-Node-GUI to TCP 127.0.0.1 Port 5000"

    [stack.component.process]
    exec_name = "python"
    all_args = ["main.py"]

    [[stack.component.require]]
    # GUI-ONLY: the Node Manager is a Tkinter app, and its venv is built WITHOUT
    # --system-site-packages, so `import tkinter` resolves through the host python — which only has
    # the _tkinter extension when python3-tk is installed. Probed by MODULE (in-process
    # importlib.util.find_spec), never by a version-specific /usr/lib/python3.X/tkinter path.
    # This component is OPTIONAL: on a headless box it is skipped and the rest of the MeshCore
    # stack (meshcore-pi + the CLI) installs, builds and runs normally.
    gui = true
    module = "tkinter"
    install = "sudo apt install -y python3-tk"
    note = "Tk toolkit for the Node Manager GUI (desktop only)"

    [stack.component.source]
    path = "src/meshcore-node-manager"
    pin_commit = "03b330e4eb5fc9030d08bcc360aa03eccd636539"
    pin_tag = "v1.2.0-14-g03b330e"
    remote = "https://github.com/makrohard/meshcore-node-manager.git"
    branch = "meshcore-api-compat"

  [[stack.component]]
  id = "meshcore-cli"
  readiness = "manual"
  name = "MeshCore CLI"
  kind = "oneshot"
  purpose = "One-shot / REPL client over TCP 5000 (meshcli)."
  tx_capable = true
  optional = true
  interactive = true
  depends_on = ["meshcore-pi"]
  run = ".venv/bin/meshcli {host} {port} {json} {debug}"
  build_steps = [
    { argv = ["python3", "-m", "venv", ".venv"] },
    { argv = [".venv/bin/pip", "install", "."], announce = "[install] meshcli into {source}/.venv — pip is quiet off-TTY; progress: watch {source}/.venv/lib grow" },
  ]
  # `pip install .` places the meshcli console script in the venv — that IS the build artifact.
  bin = ".venv/bin/meshcli"

    [stack.component.process]
    exec_name = "meshcli"

    # meshcli connects to the meshcore-pi companion server (default port 5000).
    [[stack.component.param]]
    name = "host"
    validator = "host"
    kind = "str"
    arg = "-t"
    default = "127.0.0.1"
    label = "Companion host"
    [[stack.component.param]]
    name = "port"
    kind = "int"
    arg = "-p"
    default = "5000"
    min = 1
    max = 65535
    label = "Companion TCP port"
    [[stack.component.param]]
    name = "json"
    kind = "flag"
    flag = "-j"
    label = "JSON output"
    advanced = true
    [[stack.component.param]]
    name = "debug"
    kind = "flag"
    flag = "-D"
    label = "Debug logging"
    advanced = true

    [stack.component.source]
    path = "src/meshcore-cli"
    pin_commit = "d6c5af7b31102393f9b93be165261e15c749aae0"
    pin_tag = "v1.5.0-18-gd6c5af7"
    remote = "https://github.com/meshcore-dev/meshcore-cli.git"
    branch = "main"

# =====================================================================
# Stack: kiss — KISS/TCP TNC (+ optional serial PTY)
# =====================================================================
[[stack]]
id = "kiss"
name = "LoRaHAM KISS TNC"
summary = "Daemon-backed KISS/TCP TNC (port 8001) for APRS clients, with an optional serial PTY."
main = "loraham-kiss-tnc"

  [[stack.component]]
  id = "loraham-kiss-tnc"
  readiness = "endpoint"
  name = "LoRaHAM KISS/TCP TNC"
  kind = "service"
  band = "433"
  bands = ["433", "868"]
  purpose = "AX.25/KISS-over-TCP bridge for APRS clients; consumes the daemon sockets for the chosen band (433 or 868)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  start_order = 1
  # loraham-kiss-tnc is now its OWN repo (flat layout): build.sh + the binary live at the checkout
  # root, and the binary is named after the checkout dir (src/loraham-kiss-tnc -> "loraham-kiss-tnc").
  # Explicit run_argv/build_steps + run_cwd so the root binary/script resolve cwd-relative.
  build = "bash build.sh"
  build_steps = [ { argv = ["bash", "build.sh"] } ]
  run = "./loraham-kiss-tnc --config loraham_kiss_tnc.conf.example {kiss_port} {kiss_host} {rx_freq} {tx_freq} {data_socket} {conf_socket} {rx_only} {verbose}"
  run_argv = ["./loraham-kiss-tnc", "--config", "loraham_kiss_tnc.conf.example", "{param:kiss_port}", "{param:kiss_host}", "{param:kiss_bind}", "{param:rx_freq}", "{param:tx_freq}", "{param:data_socket}", "{param:conf_socket}", "{param:rx_only}", "{param:verbose}"]
  run_cwd = "{source}"
  bin = "loraham-kiss-tnc"
  test = "bash run_tests.sh"

    # CLI overrides of the .conf file (all start-time). Band 868 uses its own
    # per-band config: set 868 frequencies + the lora868f/loraconf868 sockets there.
    [[stack.component.param]]
    name = "kiss_port"
    kind = "int"
    arg = "--kiss-port"
    default = "8001"
    min = 1
    max = 65535
    label = "KISS TCP port"
    # 868 LoRa-APRS uses the 869.4–869.65 MHz sub-band (g3: 10% duty / 500 mW) for
    # automated stations -> 869.525 MHz. 433 keeps the LoRa-APRS split (RX 433.775 /
    # TX 433.900). Per-band defaults are picked from the band the stack runs on.
    [[stack.component.param]]
    name = "rx_freq"
    validator = "freq"
    kind = "str"
    arg = "--rx-freq"
    band_defaults = { "433" = "433.775", "868" = "869.525" }
    default = "433.775"
    label = "RX frequency (MHz)"
    [[stack.component.param]]
    name = "tx_freq"
    validator = "freq"
    kind = "str"
    arg = "--tx-freq"
    band_defaults = { "433" = "433.900", "868" = "869.525" }
    default = "433.900"
    label = "TX frequency (MHz)"
    [[stack.component.param]]
    name = "kiss_bind"
    kind = "str"
    arg = "--bind"
    default = "127.0.0.1"
    validator = "bind"
    group = "Network exposure"
    label = "Allow-list — who may connect (127.0.0.1 = this Pi only; LAN CIDR or 0.0.0.0/0 to expose; NO auth)"
    [[stack.component.param]]
    name = "kiss_host"
    kind = "str"
    arg = "--kiss-host"
    default = "127.0.0.1"
    group = "Network exposure"
    label = "Bind host (advanced; overrides the --bind-derived address)"
    advanced = true
    [[stack.component.param]]
    name = "data_socket"
    kind = "str"
    validator = "path"
    arg = "--data-socket"
    band_defaults = { "433" = "/tmp/lora433f.sock", "868" = "/tmp/lora868f.sock" }
    default = "/tmp/lora433f.sock"
    label = "Daemon data socket"
    advanced = true
    [[stack.component.param]]
    name = "conf_socket"
    kind = "str"
    validator = "path"
    arg = "--conf-socket"
    band_defaults = { "433" = "/tmp/loraconf433.sock", "868" = "/tmp/loraconf868.sock" }
    default = "/tmp/loraconf433.sock"
    label = "Daemon config socket"
    advanced = true
    [[stack.component.param]]
    name = "rx_only"
    kind = "flag"
    flag = "--rx-only"
    label = "RX only (no TX)"
    advanced = true
    [[stack.component.param]]
    name = "verbose"
    kind = "flag"
    flag = "--verbose"
    label = "Verbose logging"
    advanced = true

    [stack.component.source]
    path = "src/loraham-kiss-tnc"
    pin_commit = "350454768c2bfaaf3d719c6085d9d38144ee48bb"
    pin_tag = "v0.4.0-3-g3504547"
    remote = "https://github.com/makrohard/loraham-kiss-tnc.git"
    branch = "main"

    [stack.component.process]
    # Must match the ACTUAL binary basename (run_argv[0]/bin = "loraham-kiss-tnc", hyphens) — the
    # repo split renamed it from loraham_kiss_tnc; a stale underscore name made probe_process never
    # match the running TNC, so status read "stopped" and known-working refused to confirm it.
    exec_name = "loraham-kiss-tnc"

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:8001"
    ready = true
    role = "listener"
    description = "KISS over TCP"
    client = true
    scheme = "kiss"

    [[stack.component.resource]]
    key = "tcp.port.8001"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.433"
    kind = "daemon-socket"
    mode = "consumer"

  [[stack.component]]
  id = "loraham-kiss-serial"
  readiness = "process"
  name = "KISS serial (PTY)"
  kind = "service"
  band = "433"
  purpose = "Optional socat PTY <-> KISS/TCP(8001) bridge for serial-KISS clients."
  tx_capable = true
  optional = true
  depends_on = ["loraham-kiss-tnc"]
  start_order = 2
  run_argv = ["socat", "-d", "-d", "PTY,link={runtime}/state/loraham_kiss,raw,echo=0,waitslave,mode=666", "TCP:127.0.0.1:8001"]
  note = "Optional socat PTY <-> KISS/TCP(127.0.0.1:8001) bridge; exposes <runtime>/state/loraham_kiss (in-root; point external tools there). Runs socat DIRECTLY (not the wrapper script, which traps SIGTERM and respawns socat) so lhpc owns the socat process and stops it cleanly. Needs socat."

    [stack.component.source]
    path = "src/loraham-kiss-tnc"
    pin_commit = "350454768c2bfaaf3d719c6085d9d38144ee48bb"
    pin_tag = "v0.4.0-3-g3504547"
    remote = "https://github.com/makrohard/loraham-kiss-tnc.git"
    branch = "main"

    [stack.component.process]
    exec_name = "socat"

    [[stack.component.require]]
    cmd = "socat"
    install = "sudo apt install socat"

    [[stack.component.endpoint]]
    kind = "path"
    address = "state/loraham_kiss"
    role = "provider"
    description = "Serial KISS PTY (socat)"
    client = true
    scheme = "serial"

    [[stack.component.resource]]
    key = "serial.loraham-kiss"
    kind = "serial"
    mode = "exclusive"

# =====================================================================
# Stack: meshtastic — native meshtasticd on 868 (direct SPI)
# =====================================================================
[[stack]]
id = "meshtastic"
name = "Meshtastic"
summary = "Native meshtasticd on the RF95 (433 or 868). Run ROOTLESS by lhpc as a user process. Direct SPI — conflicts with the LoRaHAM daemon."
main = "meshtastic"

  [[stack.component]]
  id = "meshtastic"
  name = "Meshtastic (meshtasticd)"
  kind = "service"
  band = "868"
  bands = ["433", "868"]
  purpose = "meshtasticd driving the RF95 directly; lhpc starts/stops it rootless with a runtime config."
  tx_capable = true
  pre = 'mkdir -p "{runtime}/state/meshtasticd/ssl"'
  run = "/usr/bin/meshtasticd -c {runtime}/config/files/meshtasticd.yaml -d {runtime}/state/meshtasticd"
  # After meshtasticd is listening on the API, set the LoRa region (TX stays
  # disabled while region is UNSET). Idempotent; runs detached. Tries the local
  # meshtastic CLI then PATH.
  post_start = 'sleep 12; meshtastic --host 127.0.0.1 --set lora.region {region}; meshtastic --host 127.0.0.1 --set-owner "{node_name}" --set-owner-short "{node_short}"'
  pre_steps = [ { kind = "mkdir", path = "{runtime}/state/meshtasticd/ssl" } ]
  readiness = "endpoint"
  post_steps = [
    { kind = "delay", seconds = 12 },
    { kind = "exec", argv = ["meshtastic", "--host", "127.0.0.1", "--set", "lora.region", "{param:region}"], optional = true },
    { kind = "exec", argv = ["meshtastic", "--host", "127.0.0.1", "--set-owner", "{param:node_name}", "--set-owner-short", "{param:node_short}"], optional = true },
  ]
  note = "ONE-TIME setup (free the radio + stop the packaged service auto-starting): `sudo systemctl disable --now meshtasticd`. SPI must be enabled (config.txt: dtparam=spi=on, dtoverlay=spi0-0cs). lhpc runs/stops it WITHOUT root ONLY WHEN you are in the spi+gpio groups — see System dependencies below; grant with the shown command (then log out/in or reboot) if missing. Shares the SPI radio with the LoRaHAM daemon. Region + node name are applied automatically after start (config: Region / Node name)."

    [[stack.component.param]]
    name = "region"
    kind = "enum"
    choices = ["EU_868", "EU_433", "US", "ANZ", "CN", "JP", "KR", "IN", "RU", "UA_868", "UNSET"]
    default = "EU_868"
    band_defaults = { "433" = "EU_433", "868" = "EU_868" }
    label = "LoRa region (sets TX legality; required for TX)"
    [[stack.component.param]]
    name = "node_name"
    validator = "node"
    kind = "str"
    default = "LoRaHAM Pi"
    label = "Node name (long)"
    [[stack.component.param]]
    name = "node_short"
    kind = "str"
    default = "LHPi"
    label = "Node name (short, ~4 chars)"

    [stack.component.source]
    path = "src/LoRaHAM_Pi"
    remote = "https://github.com/LoRaHAM/LoRaHAM_Pi.git"
    local_dir = "LoRaHAM_Pi"
    artifact = true
    branch = "main"

    [stack.component.process]
    exec_name = "meshtasticd"

    [[stack.component.require]]
    check_file = "/usr/bin/meshtasticd"
    install = "sudo apt install -y meshtasticd"
    note = "meshtasticd binary (Meshtastic apt repository)"
    [[stack.component.require]]
    check_file = "/dev/spidev0.0"
    install = "Enable SPI: add 'dtparam=spi=on' and 'dtoverlay=spi0-0cs' to /boot/firmware/config.txt, then reboot"
    note = "SPI device (RF95 on SPI0)"
    [[stack.component.require]]
    groups = ["spi", "gpio"]
    install = "sudo usermod -aG spi,gpio $USER"
    note = "spi + gpio group membership — needed to run meshtasticd WITHOUT root"

    # meshtasticd YAML config generated from the LoRaHAM base, per band (the Lora
    # pins differ between the 433 and 868 boards). Written to the runtime root so no
    # root is needed; run uses -c on it. Web port forced >1024 for rootless.
    # Node identity (owner long/short) is a DEVICE setting saved in the node's
    # prefs, not the YAML — so it is set via the API after start (see post_start),
    # not here. This file holds the hardware/web/log config only.
    [stack.component.config_file]
    path = "{runtime}/config/files/meshtasticd.yaml"
    fmt = "yaml-update"
    base = "meshtastic/config.yaml"
      [[stack.component.config_file.param]]
      name = "web_port"
      key = "Port"
      section = "Webserver"
      kind = "int"
      default = "9443"
      min = 1025
      max = 65535
      label = "Web UI port (>1024 for rootless)"
      [[stack.component.config_file.param]]
      name = "ssl_key"
      key = "SSLKey"
      section = "Webserver"
      kind = "str"
      default = "{runtime}/state/meshtasticd/ssl/private_key.pem"
      validator = "path"
      label = "SSL key path (writable, for rootless web)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "ssl_cert"
      key = "SSLCert"
      section = "Webserver"
      kind = "str"
      default = "{runtime}/state/meshtasticd/ssl/certificate.pem"
      validator = "path"
      label = "SSL cert path (writable, for rootless web)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "loglevel"
      key = "LogLevel"
      section = "Logging"
      kind = "enum"
      choices = ["debug", "info", "warn", "error"]
      default = "info"
      label = "Log level"
      advanced = true
      [[stack.component.config_file.param]]
      name = "max_nodes"
      key = "MaxNodes"
      section = "General"
      kind = "int"
      default = "200"
      label = "Max nodes"
      advanced = true
      [[stack.component.config_file.param]]
      name = "ble"
      key = "BLE"
      section = "Interfaces"
      kind = "flag"
      label = "Bluetooth interface"
      advanced = true
      [[stack.component.config_file.param]]
      name = "mqtt"
      key = "MQTT"
      section = "Interfaces"
      kind = "flag"
      label = "MQTT interface"
      advanced = true
      [[stack.component.config_file.param]]
      name = "cs"
      key = "CS"
      section = "Lora"
      kind = "int"
      default = "7"
      band_defaults = { "433" = "8", "868" = "7" }
      label = "Lora CS pin"
      advanced = true
      [[stack.component.config_file.param]]
      name = "irq"
      key = "IRQ"
      section = "Lora"
      kind = "int"
      default = "16"
      band_defaults = { "433" = "25", "868" = "16" }
      label = "Lora IRQ pin (DIO0)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "reset"
      key = "Reset"
      section = "Lora"
      kind = "int"
      default = "6"
      band_defaults = { "433" = "5", "868" = "6" }
      label = "Lora Reset pin"
      advanced = true
      [[stack.component.config_file.param]]
      name = "busy"
      key = "Busy"
      section = "Lora"
      kind = "int"
      default = "12"
      band_defaults = { "433" = "24", "868" = "12" }
      label = "Lora Busy pin (DIO1)"
      advanced = true

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:4403"
    ready = true
    role = "listener"
    description = "Meshtastic API"
    client = true
    scheme = "tcp"
    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:9443"
    role = "listener"
    description = "Meshtastic web GUI"
    client = true
    scheme = "https"

    [[stack.component.resource]]
    key = "loraham.radio.868"
    kind = "radio-band"
    mode = "exclusive"
    note = "Owns the RF95 -> conflicts with the LoRaHAM daemon (shared SPI radio)."
    [[stack.component.resource]]
    key = "loraham.radio.433"
    kind = "radio-band"
    mode = "exclusive"

# =====================================================================
# Stack: meshcom — MeshCom firmware in QEMU (433 DIRECT)
# =====================================================================
[[stack]]
id = "meshcom"
name = "MeshCom (QEMU)"
summary = "MeshCom firmware under QEMU, bridged to the daemon. 433 MHz, daemon DIRECT. Order: daemon -> bridge -> GPS -> QEMU."
main = "meshcom-qemu"

  [[stack.component]]
  id = "meshcom-bridge"
  name = "MeshCom <-> LoRaHAM bridge"
  kind = "service"
  band = "433"
  purpose = "TCP(7000) <-> daemon Unix-socket bridge (--backend loraham)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  # The QEMU MeshCom firmware has NO real radio (EXTERNAL_RADIO): its own MAC/CAD cannot
  # touch the channel, so channel access is delegated to the daemon. The bridge itself
  # forces "SET TXMODE=MANAGED" on connect (loraham_backend.cpp), so the declared mode must
  # match MANAGED — declaring DIRECT here only made lhpc set+verify DIRECT moments before
  # the bridge flipped it back to MANAGED.
  requires_daemon_tx = "MANAGED"
  start_order = 1
  build = "cmake -S . -B build && cmake --build build"
  build_steps = [ { argv = ["cmake", "-S", ".", "-B", "build"] }, { argv = ["cmake", "--build", "build"] } ]
  readiness = "endpoint"
  run = "build/meshcom-loraham-bridge {bind} {port} {backend} {password_file}"
  bin = "build/meshcom-loraham-bridge"
  # Deterministic, hardware-free host test: the bridge's own CTest suite (FakeBackend by default —
  # no daemon, no QEMU, no radio). The build step above already compiles the test binaries +
  # build/CTestTestfile.cmake, so auto-install runs this right after the build. COMPONENT-level key
  # (must precede the [[…param]] sub-tables, else TOML binds it to the last param table and it is
  # lost — same gotcha as meshcom-qemu's test).
  test = "ctest --test-dir build --output-on-failure"

    # Bridge CLI (start-time). RF params are NOT CLI — they arrive from the firmware
    # over the XR protocol. The port must match the firmware's EXTERNAL_RADIO_PORT.
    [[stack.component.param]]
    name = "port"
    kind = "int"
    arg = "--port"
    default = "7000"
    min = 0
    max = 65535
    label = "Control TCP port (= firmware XR_PORT)"
    [[stack.component.param]]
    name = "bind"
    validator = "host"
    kind = "str"
    arg = "--bind"
    default = "127.0.0.1"
    label = "Bind address (loopback recommended)"
    advanced = true
    [[stack.component.param]]
    name = "backend"
    kind = "enum"
    choices = ["loraham", "fake"]
    arg = "--backend"
    default = "loraham"
    label = "Radio backend (fake = no RF)"
    advanced = true
    [[stack.component.param]]
    name = "password_file"
    kind = "str"
    validator = "path"
    arg = "--password-file"
    default = ""
    label = "HMAC password file (blank = open auth)"
    advanced = true

    [stack.component.source]
    path = "src/meshcom-loraham-bridge"
    pin_commit = "e0ab0776c97f2c995f2155a57ce350a59a5bfff9"
    pin_tag = "e0ab077"
    remote = "https://github.com/makrohard/meshcom-loraham-bridge.git"
    branch = "main"

    [stack.component.process]
    exec_name = "meshcom-loraham-bridge"

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:7000"
    ready = true
    role = "listener"
    description = "MeshCom firmware client port."

    [[stack.component.resource]]
    key = "tcp.port.7000"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.433"
    kind = "daemon-socket"
    mode = "consumer"
    [[stack.component.resource]]
    key = "loraham.profile.433"
    kind = "daemon-profile"
    mode = "requirement"
    requirement = "MANAGED"

  [[stack.component]]
  id = "meshcom-gps-relay"
  readiness = "process"
  name = "MeshCom GPS relay"
  kind = "service"
  purpose = "Feeds NMEA into the QEMU node's virtual UART1 (fixture or host gpsd)."
  tx_capable = false
  optional = true
  start_order = 2
  run = "python3 scripts/gps-relay.py --mode fixture --fixture fixtures/gps/valid_fix.nmea --uart .run/gps-uart1.sock {rate} {loop}"

    # Fixture-replay knobs (start-time). mode/fixture/uart stay fixed (gpsd mode
    # would need --fixture removed — switch it by editing the run line).
    [[stack.component.param]]
    name = "rate"
    kind = "str"
    arg = "--rate"
    default = "5"
    label = "Fixture sentences/sec"
    [[stack.component.param]]
    name = "loop"
    kind = "flag"
    flag = "--loop"
    default = "on"
    label = "Replay continuously"
  note = "Optional. Start before the node: GPS init is one-shot."

    [stack.component.source]
    path = "src/meshcom-qemu-raspi"
    pin_commit = "6519d25401e1b5b680af18f7a5a02adda2e2472d"
    pin_tag = "6519d25"
    remote = "https://github.com/makrohard/meshcom-qemu-raspi.git"
    branch = "main"

    [stack.component.process]
    exec_name = "python3"
    all_args = ["gps-relay.py"]

  [[stack.component]]
  id = "meshcom-qemu"
  name = "MeshCom QEMU node"
  kind = "service"
  band = "433"
  purpose = "Runs MeshCom firmware headless under QEMU (web 18083, net-console 12323)."
  tx_capable = true
  depends_on = ["meshcom-bridge", "meshcom-gps-relay"]
  start_order = 3
  # Shown as a transient note right after start — the emulated node is slow to boot, so set
  # expectations (and steer heavy GUI viewing off this Pi during boot).
  start_note = "MeshCom node launched under QEMU — the firmware boots in ~1–2 min. Its web UI at :18083 is sluggish until then, and its callsign switches to yours once the node finishes booting."
  # The EXTERNAL_RADIO firmware bakes the bridge host/port (and optional HMAC
  # password) from the XR_* env vars — the qemu overlay's platformio.ini reads
  # ${sysenv.XR_HOST}/${sysenv.XR_PORT}. Without them set, -D EXTERNAL_RADIO_PORT=
  # is empty and the build fails. 10.0.2.2 = QEMU user-net gateway -> host; 7000 =
  # the meshcom-bridge default port; password (if any) from /tmp/xr_pw.
  build = 'env XR_HOST=10.0.2.2 XR_PORT=7000 XR_PASSWORD="$(cat {runtime}/config/secrets/xr_pw 2>/dev/null)" scripts/build.sh --env qemu-headless-extradio-gpsd'
  # SELF-SUFFICIENT fresh clone: the workspace (.work/ MeshCom firmware + overlay +
  # OpenETH vendor) is prepared by the repo's own pinned setup scripts before build.sh —
  # a linked dev tree used to carry a pre-built .work/, a managed clone must not.
  # The firmware source MUST be the external-radio feature branch: the default
  # (upstream icssw-org pinned tag) has NO external-radio transport, so the extradio
  # build boots with "LoRa radio disabled (no backend)" and never talks to the bridge —
  # no messages in either direction (live finding).
  build_steps = [
    { argv = ["scripts/setup.sh", "--src", "https://github.com/makrohard/MeshCom-Firmware.git", "--ref", "feature/external-radio-tcp-draft"] },
    { argv = ["scripts/apply-overlay.sh"] },
    { argv = ["scripts/prepare-openeth.sh"] },
    { argv = ["scripts/build.sh", "--env", "qemu-headless-extradio-gpsd"], env = { XR_HOST = "10.0.2.2", XR_PORT = "7000", XR_PASSWORD = "@file?:{runtime}/config/secrets/xr_pw" } },
  ]
  readiness = "endpoint"
  run = "scripts/run.sh {env} {qemu}"
  # RX-safe host test (verifies the guest serves the MeshCom web UI + net-console and no radio
  # is active). SELF-SUFFICIENT: when no guest is running, test.sh boots the newest built env
  # itself and stops exactly that instance afterwards — so auto-install runs it right after the
  # build (no running stack needed). A guest that is already running is probed and left alone.
  # MUST be a COMPONENT-level key — placed after the [[…param]] sub-tables it would bind to the
  # last param table (TOML), leaving the component with no test ("skipped (no host tests)").
  test = "scripts/test.sh"
  # The build artifact is the merged firmware flash image for the chosen env, NOT
  # qemu-system-xtensa (the system emulator that run.sh locates separately).
  bin = ".work/MeshCom-Firmware/.pio/build/{env}/flash.bin"
  # MeshCom's callsign is a NODE setting applied over the net-console (12323) and stored in
  # flash/NVS (survives restarts). Wait for the port, then push `--setcall` — no nc/shell. QEMU
  # opens 12323 almost immediately, but the firmware needs ~a minute to boot before it accepts a
  # command, so re-send over a window until it lands (idempotent). `skip_if_param` sends NO
  # --setcall for an empty / N0CALL callsign (the structured equivalent of the old shell guard).
  post_steps = [
    { kind = "tcp_wait", port = 12323, timeout = 180 },
    # ACK-AWARE + IDEMPOTENT (live finding: 17 blind connects starved the node's heap
    # and killed its web UI): probe `--info` first and SKIP when the callsign is already
    # set (it persists in NVS across restarts); otherwise send until the firmware ACKs
    # ("Call:<CALL> ... set") — ONE acknowledged send, never the full blind window.
    # probe_stop_on matches --info's DISPLAY format `...Call: <DJ0CHE-1>` (space + angle
    # brackets); stop_on matches the setcall ACK `Call:DJ0CHE-1 Short:... set`. They DIFFER —
    # with the ACK pattern used for the probe too, a persisted callsign was never detected, so
    # every start re-sent --setcall, the firmware saved + auto-rebooted, and the QEMU guest
    # wedged in the bootloader (guest reset is not survivable in qemu-xtensa) — live finding.
    { kind = "tcp_send", port = 12323, data = "--setcall {param:mc_callsign}\n", probe = "--info\n", probe_stop_on = "Call: <{param:mc_callsign}>", stop_on = "Call:{param:mc_callsign}", repeat = 21, interval = 8, skip_if_param = "mc_callsign", skip_values = ["", "N0CALL"] },
  ]

    # MeshCom node callsign (with optional -SSID, e.g. OE1ABC-12); defaults to the
    # operator callsign. Applied via the net-console after boot (see post_start).
    [[stack.component.param]]
    name = "mc_callsign"
    validator = "callsign"
    kind = "str"
    default = "{callsign}"
    label = "MeshCom callsign (with -SSID)"
    # Which firmware image to boot. Switching env needs that image built first
    # (apply_mode=build): rebuild with scripts/build.sh --env <env>.
    [[stack.component.param]]
    name = "env"
    kind = "enum"
    choices = ["qemu-headless", "qemu-headless-extradio", "qemu-headless-gpsd", "qemu-headless-extradio-gpsd"]
    arg = "--env"
    default = "qemu-headless-extradio-gpsd"
    label = "Firmware env (needs matching build)"
    apply_mode = "build"
    [[stack.component.param]]
    name = "qemu"
    kind = "str"
    arg = "--qemu"
    default = ""
    label = "qemu-system-xtensa path (auto if blank)"
    advanced = true

    [stack.component.source]
    path = "src/meshcom-qemu-raspi"
    pin_commit = "6519d25401e1b5b680af18f7a5a02adda2e2472d"
    pin_tag = "6519d25"
    remote = "https://github.com/makrohard/meshcom-qemu-raspi.git"
    branch = "main"

    [stack.component.process]
    exec_name = "qemu-system-xtensa"

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:18083"
    role = "listener"
    description = "MeshCom web UI"
    client = true
    scheme = "http"
    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:12323"
    ready = true
    role = "listener"
    description = "net-console."

    [[stack.component.resource]]
    key = "tcp.port.18083"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "tcp.port.12323"
    kind = "tcp-port"
    mode = "exclusive"

  [[stack.component]]
  id = "meshcom-firmware"
  name = "MeshCom firmware"
  kind = "firmware"
  purpose = "PlatformIO firmware image consumed by the QEMU node."
  tx_capable = true
  optional = true

    [stack.component.source]
    path = "src/MeshCom-Firmware"
    pin_commit = "302e3aaff46cbefa29ac651640559b920dd3b713"
    pin_tag = "v4.35p.06.24-17-g302e3aa"
    remote = "https://github.com/makrohard/MeshCom-Firmware.git"
    branch = "feature/external-radio-tcp-draft"

# =====================================================================
# Stack: meshcore — MeshCore Pi node (daemon-backed, 868)
# =====================================================================
[[stack]]
id = "meshcore"
name = "MeshCore Pi (868)"
summary = "MeshCore Python node, daemon-backed on 868 (auto-starts the daemon). Optional Node Manager GUI and CLI."
main = "meshcore-pi"

  [[stack.component]]
  id = "meshcore-pi"
  readiness = "endpoint"
  # A Python node that imports its stack (LoRaRF/scapy/crypto) before opening TCP 5000 can
  # take well over the 6 s global default to become ready — give it a longer window so start
  # verifies instead of tearing it down. Tune down if your Pi is faster.
  readiness_timeout = 45.0
  name = "MeshCore Pi (868)"
  kind = "service"
  band = "868"
  purpose = "Async MeshCore node using the daemon on 868 (lorahaminterface)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  start_order = 1
  run = ".venv/bin/python meshcore.py {runtime}/config/files/meshcore-pi.toml"
  test = ".venv/bin/python -m pytest tests/"
  # The build_steps create the in-tree venv; its interpreter IS the build artifact, so `is_built`
  # honestly reads "not built" until the venv exists (exec_name is a process-match name, not a path).
  bin = ".venv/bin/python"
  # Self-sufficient managed clone: the venv is built IN-TREE by `lhpc build`. Upstream has
  # no requirements file — deps enumerated from its README (an upstream requirements.txt
  # would make this declarative).
  # --system-site-packages: the Pi OS already ships the GPIO/SPI bindings
  # (python3-rpi.gpio, python3-lgpio, python3-spidev) — reusing them avoids compiling
  # lgpio from source (which needs swig); pip adds only what the OS lacks.
  build_steps = [
    { argv = ["python3", "-m", "venv", "--system-site-packages", ".venv"] },
    { argv = [".venv/bin/pip", "install", "pycryptodome", "aiotools", "pyserial_asyncio",
              "typing-extensions", "LoRaRF", "scapy==2.5.0", "pytest"] },
  ]

    # meshcore-pi has no CLI flags — all settings live in the TOML. The controller
    # generates the runtime config from the in-repo config-loraham868.toml base,
    # updating just these keys (blank = keep the base/preset default).
    [stack.component.config_file]
    path = "{runtime}/config/files/meshcore-pi.toml"
    fmt = "toml-update"
    base = "examples/config-loraham868.toml"
      [[stack.component.config_file.param]]
      name = "preset"
      key = "preset"
      section = "interface.loraham868"
      kind = "enum"
      choices = ["eu_uk_long", "eu_uk_medium", "eu_uk_narrow"]
      default = "eu_uk_narrow"
      label = "RF preset"
      [[stack.component.config_file.param]]
      name = "enable_tx"
      key = "enable_tx"
      section = "interface.loraham868"
      kind = "flag"
      default = "on"
      label = "Enable TX (off = RX-only)"
      [[stack.component.config_file.param]]
      name = "node_name"
      validator = "node"
      key = "name"
      section = "device.companion"
      kind = "str"
      default = "{callsign}"
      label = "Node name (defaults to your callsign)"
      [[stack.component.config_file.param]]
      name = "meshcore_allow"
      validator = "bind"
      key = "wifi.allow"
      section = "device.companion"
      kind = "str"
      default = "127.0.0.1"
      group = "Network exposure"
      label = "Allow-list — who may connect (127.0.0.1 = this Pi only; LAN CIDR or 0.0.0.0/0 to expose; NO auth)"
      [[stack.component.config_file.param]]
      name = "txpower"
      key = "txpower"
      section = "interface.loraham868"
      kind = "int"
      default = "14"
      min = 0
      max = 20
      label = "TX power dBm"
      advanced = true
      [[stack.component.config_file.param]]
      name = "frequency"
      key = "frequency"
      section = "interface.loraham868"
      kind = "int"
      # Blank = let the selected RF preset own the frequency (eu_uk_narrow -> 869.618 MHz, matching
      # the T-Deck MeshCore firmware). A non-blank value here is written as an explicit override and
      # would clobber the preset's frequency (e.g. forcing 869.525 onto eu_uk_narrow's 869.618, which
      # put the daemon 93 kHz off the T-Deck in a 62.5 kHz passband -> no RX either way).
      default = ""
      min = 430000000
      max = 950000000
      label = "Frequency Hz"
      advanced = true
      [[stack.component.config_file.param]]
      name = "airtime"
      key = "airtime"
      section = "interface.loraham868"
      kind = "int"
      default = "10"
      min = 0
      max = 100
      label = "Duty-cycle limit %"
      advanced = true

    [stack.component.source]
    path = "src/meshcore-pi"
    pin_commit = "3f14d3a82afecf62d2f6896b603d697761c61dc0"
    pin_tag = "3f14d3a"
    remote = "https://github.com/makrohard/meshcore-pi.git"
    branch = "loraham-daemon-interface"

    [stack.component.process]
    exec_name = "python"
    all_args = ["meshcore.py"]

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:5000"
    ready = true
    role = "listener"
    description = "MeshCore companion TCP"
    client = true
    scheme = "tcp"

    [[stack.component.resource]]
    key = "tcp.port.5000"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.868"
    kind = "daemon-socket"
    mode = "consumer"
    [[stack.component.resource]]
    key = "loraham.profile.868"
    kind = "daemon-profile"
    mode = "requirement"
    requirement = "MANAGED"

  [[stack.component]]
  id = "meshcore-nodegui"
  name = "MeshCore Node Manager (GUI)"
  kind = "service"
  purpose = "Tkinter desktop GUI (main.py); connects to the companion TCP 5000."
  tx_capable = false
  optional = true
  depends_on = ["meshcore-pi"]
  # A GUI app (not a terminal TUI) — lhpc can Start/Stop it; it opens on the Pi's
  # display (DISPLAY inherited, else :0).
  run = 'env DISPLAY="${DISPLAY:-:0}" .venv/bin/python main.py'
  run_argv = [".venv/bin/python", "main.py"]
  build_steps = [
    { argv = ["python3", "-m", "venv", ".venv"] },
    { argv = [".venv/bin/pip", "install", "-r", "requirements.txt"] },
  ]
  # In-tree venv interpreter is the build artifact (honest `is_built`).
  bin = ".venv/bin/python"
  run_cwd = "{source}"
  run_env = { DISPLAY = "@env:DISPLAY=:0" }
  readiness = "process"
  note = "Desktop GUI (needs a display/X server on the Pi)."
  start_note = "Connect MeshCore-Node-GUI to TCP 127.0.0.1 Port 5000"

    [stack.component.process]
    exec_name = "python"
    all_args = ["main.py"]

    [stack.component.source]
    path = "src/meshcore-node-manager"
    pin_commit = "03b330e4eb5fc9030d08bcc360aa03eccd636539"
    pin_tag = "v1.2.0-14-g03b330e"
    remote = "https://github.com/makrohard/meshcore-node-manager.git"
    branch = "meshcore-api-compat"

  [[stack.component]]
  id = "meshcore-cli"
  readiness = "manual"
  name = "MeshCore CLI"
  kind = "oneshot"
  purpose = "One-shot / REPL client over TCP 5000 (meshcli)."
  tx_capable = true
  optional = true
  interactive = true
  depends_on = ["meshcore-pi"]
  run = ".venv/bin/meshcli {host} {port} {json} {debug}"
  build_steps = [
    { argv = ["python3", "-m", "venv", ".venv"] },
    { argv = [".venv/bin/pip", "install", "."] },
  ]
  # `pip install .` places the meshcli console script in the venv — that IS the build artifact.
  bin = ".venv/bin/meshcli"

    [stack.component.process]
    exec_name = "meshcli"

    # meshcli connects to the meshcore-pi companion server (default port 5000).
    [[stack.component.param]]
    name = "host"
    validator = "host"
    kind = "str"
    arg = "-t"
    default = "127.0.0.1"
    label = "Companion host"
    [[stack.component.param]]
    name = "port"
    kind = "int"
    arg = "-p"
    default = "5000"
    min = 1
    max = 65535
    label = "Companion TCP port"
    [[stack.component.param]]
    name = "json"
    kind = "flag"
    flag = "-j"
    label = "JSON output"
    advanced = true
    [[stack.component.param]]
    name = "debug"
    kind = "flag"
    flag = "-D"
    label = "Debug logging"
    advanced = true

    [stack.component.source]
    path = "src/meshcore-cli"
    pin_commit = "3ad12c07beaac21210ed9b4b04c1fe8438722ecb"
    pin_tag = "v1.5.0-16-g3ad12c0"
    remote = "https://github.com/meshcore-dev/meshcore-cli.git"

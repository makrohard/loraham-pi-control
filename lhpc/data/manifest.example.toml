# LoRaHAM Pi Control — tracked default manifest (EXAMPLE).
#
# A STACK is a runnable application with its dependency components (some optional)
# in a start order. Each stack names a `main` component (the app itself); the
# other components are its dependencies. The single `loraham-daemon` component is
# the foundation: it is the `daemon` stack's main component and a dependency of the
# daemon-backed app stacks (resolved across stacks via `depends_on`).
#
# Path model: `source.path` is RUNTIME-ROOT-relative (resolved under the runtime
# root, default ~/loraham-pi-control). Secrets NEVER go here (config/secrets.toml).
#
# Resource modes: exclusive | cooperative | provider | consumer | requirement.

# =====================================================================
# Controller identity: LHPC's OWN checkout (a dedicated NON-stack entity).
# Observable + self-updatable, but NEVER installed/adopted/built/tested/
# started/stopped/uninstalled/cleaned/auto-install-processed. Exactly these keys are
# allowed; source_path and branch are FIXED. Use `lhpc self-update` to change it.
# =====================================================================
[controller]
id = "loraham-pi-control"
display_name = "LoRaHAM Pi Control"
source_path = "src/loraham-pi-control"
branch = "main"
remote = "https://github.com/makrohard/loraham-pi-control.git"

# =====================================================================
# Stack: daemon — the LoRaHAM daemon (radio chosen at run time)
# =====================================================================
[[stack]]
id = "daemon"
name = "LoRaHAM daemon"
summary = "The LoRaHAM daemon. Owns the radios and exposes the sockets the app stacks use. lhpc launches one --radio <band> process per band (433 and/or 868)."
main = "loraham-daemon"

  [[stack.component]]
  id = "loraham-daemon"
  name = "LoRaHAM Daemon"
  kind = "service"
  purpose = "Device driver for the LoRa radios; provides raw/framed/CONF sockets per band."
  tx_capable = true
  start_order = 0
  build = "loraham_daemon/build.sh"
  # No `-d`: `-d` makes the daemon double-fork (setsid) and re-PID away from the
  # process LHPC spawned, which breaks verified ownership. LHPC already detaches it
  # (start_new_session + redirected stdio), so it runs as the LHPC-owned session
  # leader and stop() can identity-verify it before signalling.
  # v112+ daemon: ONE radio per process. `--radio` is mandatory; `--hw` selects the board preset;
  # the plain (NON band-suffixed) --tx-mode/--cad-monitor/--cad-rssi apply to this process's band.
  # lhpc injects `radio`/`hw`/`txmode`/`cadmon`/`cadrssi` per band at spawn (see _ensure_daemon).
  run = "loraham_daemon/loraham_daemon --radio {radio} {debug} --hw {hw} --tx-mode {txmode} --cad-monitor {cadmon} --cad-rssi {cadrssi}"
  # Structured (shell-free) execution — preferred over `run`/`pre` above.
  run_argv = ["loraham_daemon/loraham_daemon", "--radio", "{param:radio}", "{param:debug}", "--hw", "{param:hw}", "--tx-mode", "{param:txmode}", "--cad-monitor", "{param:cadmon}", "--cad-rssi", "{param:cadrssi}"]
  run_cwd = "{source}"
  # v112 sockets default to /run/loraham (systemd, tmpfiles-provisioned). lhpc runs the daemon DIRECT
  # as a user, so point its sockets at /tmp — the daemon has no /tmp fallback of its own, and all
  # clients prefer /run/loraham then fall back to /tmp. LORAHAM_RUNTIME_DIR keeps the locks in-root.
  run_env = { LORAHAM_RUNTIME_DIR = "{runtime}/state/loraham", LORAHAM_SOCKET_DIR = "/tmp" }
  # build.sh consumes the RadioLib checkout as the sibling src/RadioLib — a hard BUILD-time
  # dependency (not "optional"): update includes it, uninstall refuses to remove it while
  # the daemon source is installed. RADIOLIB_DIR pins the build to the MANAGED in-root
  # clone (CONTAINMENT: without it, build.sh's discovery falls back to ~/src/RadioLib).
  build_steps = [ { argv = ["loraham_daemon/build.sh"], env = { RADIOLIB_DIR = "{runtime}/src/RadioLib" } } ]
  build_requires = ["radiolib"]
  pre_steps = [ { kind = "mkdir", path = "{runtime}/state/loraham", mode = "700" } ]
  readiness = "daemon-band"
  bin = "loraham_daemon/loraham_daemon"
  test = "loraham_daemon/run_tests.sh"
  pre = 'export LORAHAM_RUNTIME_DIR="{runtime}/state/loraham"; mkdir -p "$LORAHAM_RUNTIME_DIR"; chmod 700 "$LORAHAM_RUNTIME_DIR"'

    [[stack.component.param]]
    name = "radio"
    kind = "enum"
    # lhpc always starts one process per band (--radio 433 / 868) — one band per instance,
    # driven by the global radio mode. This hidden param survives only as the per-instance band value
    # lhpc injects at spawn; the operator sets the radio mode in the daemon Hardware settings.
    choices = ["433", "868"]
    default = "433"
    label = "Radio band"
    [[stack.component.param]]
    name = "debug"
    kind = "flag"
    flag = "--debug"
    label = "Debug logging (this daemon process)"
    # Injected-only per-PROCESS values: lhpc computes each at spawn (see _ensure_daemon) — `hw` from
    # the chosen hardware setup, and txmode/cadmon/cadrssi from THIS band's tx_<b>/cadmon_<b>/cadrssi_<b>
    # below. They are not shown in generic forms; the defaults only keep a standalone argv preview
    # well-formed (a blank value would orphan its literal flag).
    [[stack.component.param]]
    name = "hw"
    kind = "enum"
    choices = ["loraham", "uputronics-ce0", "uputronics-ce1", "waveshare-sx1262"]
    # Friendly labels for the GUI (the wire value still submits). `loraham` is the daemon's renamed
    # dual-module preset (was `legacy`, now removed by the daemon).
    choice_labels = [["loraham", "LoRaHAM"], ["uputronics-ce0", "Uputronics CE0"], ["uputronics-ce1", "Uputronics CE1"], ["waveshare-sx1262", "Waveshare SX1262"]]
    default = "loraham"
    label = "Hardware preset (--hw)"
    [[stack.component.param]]
    name = "txmode"
    kind = "enum"
    choices = ["managed", "direct"]
    default = "managed"
    label = "TX mode (this process)"
    [[stack.component.param]]
    name = "cadmon"
    kind = "enum"
    choices = ["off", "on"]
    default = "off"
    label = "CAD monitor (this process)"
    [[stack.component.param]]
    name = "cadrssi"
    kind = "int"
    default = "-90"
    min = -130
    max = 0
    label = "CAD RSSI (this process, dBm)"
    [[stack.component.param]]
    name = "tx_433"
    kind = "enum"
    choices = ["managed", "direct"]
    default = "managed"
    label = "TX mode 433"
    advanced = true
    [[stack.component.param]]
    name = "tx_868"
    kind = "enum"
    choices = ["managed", "direct"]
    default = "managed"
    label = "TX mode 868"
    advanced = true
    [[stack.component.param]]
    name = "cadmon_433"
    kind = "enum"
    choices = ["off", "on"]
    default = "off"
    label = "CAD monitor 433"
    advanced = true
    [[stack.component.param]]
    name = "cadmon_868"
    kind = "enum"
    choices = ["off", "on"]
    default = "off"
    label = "CAD monitor 868"
    advanced = true
    [[stack.component.param]]
    name = "cadrssi_433"
    kind = "int"
    default = "-90"
    min = -130
    max = 0
    label = "CAD RSSI 433 (dBm)"
    advanced = true
    [[stack.component.param]]
    name = "cadrssi_868"
    kind = "int"
    default = "-90"
    min = -130
    max = 0
    label = "CAD RSSI 868 (dBm)"
    advanced = true

    [stack.component.source]
    path = "src/loraham-daemon"
    pin_commit = "e9b7cd22326c7e34930737d2010047da3e902fa0"
    pin_tag = "v112"
    remote = "https://github.com/makrohard/LoRaHAM_Daemon.git"
    branch = "main"
    local_dir = "loraham-daemon-hardening"

    [stack.component.process]
    exec_name = "loraham_daemon"

    [[stack.component.unit]]
    name = "loraham-daemon@433.service"
    scope = "system"
    [[stack.component.unit]]
    name = "loraham-daemon@868.service"
    scope = "system"

    # Sockets are shown for reference (role=data, not run-state gating, since which
    # bands are live depends on the chosen --radio). Readiness is used by the monitor.
    [[stack.component.endpoint]]
    kind = "unix"
    address = "/tmp/loraconf433.sock"
    role = "data"
    readiness = "daemon-status"
    description = "433 CONF/status socket."
    [[stack.component.endpoint]]
    kind = "unix"
    address = "/tmp/loraconf868.sock"
    role = "data"
    readiness = "daemon-status"
    description = "868 CONF/status socket."

    [[stack.component.resource]]
    key = "spi.bus.0"
    kind = "spi-bus"
    mode = "cooperative"
    group = "spi.bus.0"
    note = "Shared SPI bus; serialized via /run/lock/loraham. Different modules use different CS."
    [[stack.component.resource]]
    key = "loraham.radio.433"
    kind = "radio-band"
    mode = "provider"
    [[stack.component.resource]]
    key = "loraham.radio.868"
    kind = "radio-band"
    mode = "provider"
    note = "Only claimed when --radio is 868; conflicts with meshtasticd on 868."
    [[stack.component.resource]]
    key = "loraham.daemon-socket.433"
    kind = "daemon-socket"
    mode = "provider"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.868"
    kind = "daemon-socket"
    mode = "provider"

  [[stack.component]]
  id = "radiolib"
  name = "RadioLib"
  kind = "library"
  purpose = "C++ radio library; REQUIRED build-time dependency of the daemon (build_requires)."
  tx_capable = false
  # Self-sufficient in-root build: produces build/libRadioLib.a, which the daemon's
  # build.sh consumes via RADIOLIB_DIR (all deps live and build under <root>/src).
  build_steps = [ { argv = ["cmake", "-S", ".", "-B", "build"] }, { argv = ["cmake", "--build", "build", "-j", "2"] } ]
  # The built artifact is the static lib the daemon links — declaring it as `bin` makes lhpc's
  # `is_built` HONEST (a fresh clone has no build/, so RadioLib correctly reads "not built" and the
  # daemon's "Build needed" banner names it; Build compiles it first via build_requires ordering).
  bin = "build/libRadioLib.a"
  # `optional` here means "not runnable / not started with the stack" — the daemon's
  # build_requires edge makes it a hard install/update/uninstall reference.
  optional = true

    [[stack.component.require]]
    check_file = "/usr/bin/cmake"
    install = "sudo apt install -y cmake"
    note = "cmake (needed to build RadioLib)"
    [[stack.component.require]]
    check_file = "/usr/include/lgpio.h"
    install = "sudo apt install -y liblgpio-dev"
    note = "lgpio development headers (RadioLib Raspberry Pi HAL)"
    [[stack.component.require]]
    check_file = "/usr/bin/g++"
    install = "sudo apt install -y build-essential"
    note = "C++ toolchain (g++ + make, via build-essential) — RadioLib's cmake build and the daemon's build.sh (g++, std=c++20) both need it; absent on a minimal Trixie lite image"

    [stack.component.source]
    path = "src/RadioLib"
    # Known-working fallback only (the default 'dev' selector installs the newest branch HEAD
    # regardless of this pin). Verified 2026-07-24: daemon built + RF-proven on the Zero 2W
    # acceptance runs against RadioLib 7.7.1-45.
    pin_commit = "0795caa41c6350a2f862137cfc22528c2aaad2bc"
    pin_tag = "7.7.1-45-g0795caa41"
    remote = "https://github.com/jgromes/RadioLib"
    branch = "master"

# =====================================================================
# Stack: chat — daemon-backed APRS/chat client
# =====================================================================
[[stack]]
id = "chat"
name = "LoRaHAM Chat"
summary = "Interactive daemon-backed APRS/chat client (loraham_chat) on 433."
main = "loraham-chat"
operator_box = false   # callsign lives in the app's own config file (CALL)

  [[stack.component]]
  id = "loraham-chat"
  name = "LoRaHAM Chat"
  kind = "service"
  band = "433"
  # 433-only: the source hard-codes /tmp/lora433.sock + /tmp/loraconf433.sock.
  purpose = "Interactive APRS/chat TUI using the daemon (manual-first)."
  tx_capable = true
  interactive = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  build = "gcc lorachat_ncurses_113.c -o loraham_chat -lncurses -lpthread"
  bin = "loraham_chat"
  # Run from the runtime config dir so the TUI reads the lhpc-seeded lorachat.conf
  # (and its in-app Ctrl-K saves persist there too) — never written into the repo.
  run = 'cd "{runtime}/config/files" && exec "{source}/loraham_chat"'
  run_argv = ["{source}/loraham_chat"]
  run_cwd = "{runtime}/config/files"
  readiness = "manual"
  note = "Interactive ncurses TUI (needs a real TTY; no headless mode). lhpc seeds lorachat.conf (callsign + TX/RX freq + APRS dest/path) from the Config page; the in-app Ctrl-K menu still works and saves back to it. Do not run with iGate (both retune the radio)."

    [[stack.component.require]]
    check_file = "/usr/include/ncurses.h"
    install = "sudo apt install -y libncurses-dev"
    note = "ncurses development headers (needed to build the chat TUI)"

    [stack.component.source]
    path = "src/LoRaHAM_Daemon"
    pin_commit = "e9b7cd22326c7e34930737d2010047da3e902fa0"
    pin_tag = "v112"
    remote = "https://github.com/makrohard/LoRaHAM_Daemon.git"
    branch = "main"
    local_dir = "LoRaHAM_Daemon"
    # Single-file artifact source: every selector (Known working / Development /
    # Latest stable) resolves to the same declared artifact (default-branch HEAD).
    artifact = true

    # Seeded into {runtime}/config/files/lorachat.conf (KEY=VALUE, split on '=').
    [stack.component.config_file]
    path = "{runtime}/config/files/lorachat.conf"
    fmt = "env"
      [[stack.component.config_file.param]]
      name = "call"
      validator = "callsign"
      key = "CALL"
      default = "{callsign}"
      label = "Callsign"
      [[stack.component.config_file.param]]
      name = "tx_freq"
      validator = "freq"
      key = "TX"
      default = "433.775"
      label = "TX frequency MHz"
      [[stack.component.config_file.param]]
      name = "rx_freq"
      validator = "freq"
      key = "RX"
      default = "433.900"
      label = "RX frequency MHz"
      [[stack.component.config_file.param]]
      name = "dest"
      key = "DEST"
      default = "ALL"
      label = "APRS destination"
      [[stack.component.config_file.param]]
      name = "aprs_path"
      key = "PATH"
      default = "APRS,WIDE1-1"
      label = "APRS path"

    [stack.component.process]
    exec_name = "loraham_chat"

# =====================================================================
# Stack: igate — daemon-backed APRS iGate
# =====================================================================
[[stack]]
id = "igate"
name = "LoRaHAM iGate"
summary = "APRS iGate (loraham_igate) bridging RF<->APRS-IS via the daemon on 433."
main = "loraham-igate"
operator_box = false   # callsign is the iGate's own -c param; position is lat/lon

  [[stack.component]]
  id = "loraham-igate"
  readiness = "process"
  name = "LoRaHAM APRS iGate"
  kind = "service"
  band = "433"
  # 433-only: the source hard-codes /tmp/lora433.sock + /tmp/loraconf433.sock.
  purpose = "APRS iGate via the daemon; beacons RF on start."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  build = "gcc -Wall -o loraham_igate loraham_iGate_106.c"
  bin = "loraham_igate"
  # No `-d` (double-fork daemonize) — LHPC owns the foreground session leader; see
  # the daemon note above.
  run = "./loraham_igate {call} {tx_freq} {rx_freq} {lat} {lon} {symbol} {digipeat} {is_interval} {rf_interval} {filter_lat} {filter_lon} {filter_radius} {relay} {repeater}"
  note = "Binary 'loraham_igate' NOT present locally -> not-installed. Beacons APRS-IS + RF on start. Callsign/position from runtime config, never the repo. Radio params (SF12/BW125/CR5/POWER17) and the APRS-IS server are compile-time constants in the source."

    [stack.component.source]
    path = "src/LoRaHAM_Daemon"
    pin_commit = "e9b7cd22326c7e34930737d2010047da3e902fa0"
    pin_tag = "v112"
    remote = "https://github.com/makrohard/LoRaHAM_Daemon.git"
    branch = "main"
    local_dir = "LoRaHAM_Daemon"
    # Single-file artifact source: every selector (Known working / Development /
    # Latest stable) resolves to the same declared artifact (default-branch HEAD).
    artifact = true

    [stack.component.process]
    exec_name = "loraham_igate"

    # iGate CLI config (all are start-time options -> apply_mode defaults to "restart").
    # The iGate REQUIRES a callsign WITH an APRS SSID (e.g. N0CALL-10); defaults to the
    # operator callsign but is usually overridden with the gate's own -SSID.
    [[stack.component.param]]
    name = "call"
    validator = "callsign"
    kind = "str"
    arg = "-c"
    default = "{callsign}"
    label = "Callsign (e.g. N0CALL-10)"
    [[stack.component.param]]
    name = "tx_freq"
    validator = "freq"
    kind = "str"
    arg = "-t"
    default = "433.900"
    label = "TX frequency (MHz)"
    [[stack.component.param]]
    name = "rx_freq"
    validator = "freq"
    kind = "str"
    arg = "-r"
    default = "433.775"
    label = "RX frequency (MHz)"
    [[stack.component.param]]
    name = "lat"
    kind = "str"
    arg = "-L"
    default = ""
    label = "Beacon latitude (DDMM.mmN)"
    [[stack.component.param]]
    name = "lon"
    kind = "str"
    arg = "-O"
    default = ""
    label = "Beacon longitude (DDDMM.mmE)"
    [[stack.component.param]]
    name = "symbol"
    kind = "str"
    validator = "aprs_symbol"
    arg = "-S"
    default = "&"
    label = "APRS symbol char"
    [[stack.component.param]]
    name = "digipeat"
    kind = "enum"
    choices = ["0", "1", "2"]
    arg = "-D"
    default = "1"
    label = "Digipeat (0=off,1=WIDE1-1,2=WIDE1+2)"
    [[stack.component.param]]
    name = "is_interval"
    kind = "int"
    arg = "-i"
    default = "600"
    min = 0
    max = 86400
    label = "APRS-IS beacon interval (s)"
    advanced = true
    [[stack.component.param]]
    name = "rf_interval"
    kind = "int"
    arg = "-f"
    default = "600"
    min = 0
    max = 86400
    label = "RF beacon interval (s)"
    advanced = true
    [[stack.component.param]]
    name = "filter_lat"
    kind = "str"
    arg = "-x"
    default = ""
    label = "APRS-IS filter centre lat (deg)"
    advanced = true
    [[stack.component.param]]
    name = "filter_lon"
    kind = "str"
    arg = "-y"
    default = ""
    label = "APRS-IS filter centre lon (deg)"
    advanced = true
    [[stack.component.param]]
    name = "filter_radius"
    kind = "str"
    arg = "-R"
    default = "50"
    label = "APRS-IS filter radius (km)"
    advanced = true
    [[stack.component.param]]
    name = "relay"
    kind = "flag"
    flag = "-m"
    label = "Relay APRS-IS → RF (transmits!)"
    advanced = true
    [[stack.component.param]]
    name = "repeater"
    kind = "flag"
    flag = "-p"
    label = "Repeater-only (no APRS-IS)"
    advanced = true

# =====================================================================
# Stack: voice — daemon-backed voice (not present locally)
# =====================================================================
[[stack]]
id = "voice"
name = "LoRaHAM Voice"
summary = "Daemon-backed Codec2 voice over LoRa (GTK app). Configurable callsign, audio devices and per-band radio params."
main = "loraham-voice"

  [[stack.component]]
  id = "loraham-voice"
  name = "LoRaHAM Voice"
  kind = "service"
  band = "433"
  bands = ["433", "868"]
  purpose = "Codec2 voice over LoRa via the daemon (GTK desktop app; needs an audio device)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  # Real-time Codec2 stream: the app paces its own TX by exact LoRa airtime (AIRTIME_MARGIN
  # + TX_EXTRA_DELAY "Daemon-Puffer") and does NOT consume the daemon's CAD=0|1 indicator.
  # The daemon's MANAGED per-frame CAD/LBT wait (<=1.5 s) would stall/gap live audio, so the
  # daemon must transmit immediately: DIRECT (the app provides its own waitr behaviour).
  requires_daemon_tx = "DIRECT"
  build = "gcc -o loraham_voice loraham_voice_v107.c `pkg-config --cflags --libs gtk+-3.0` -lcodec2 -lasound -lncurses -lpthread -lm"
  bin = "loraham_voice"
  # voice reads loraham_voice.conf from dirname(argv0), NOT the CWD — so we run it
  # via a symlink in the runtime config dir (where lhpc seeds the conf), keeping the
  # conf out of the repo. GUI app: lhpc Start/Stops it; opens on the Pi display.
  pre = 'mkdir -p "{runtime}/config/files" && ln -sf "{source}/loraham_voice" "{runtime}/config/files/loraham_voice"'
  run = 'env DISPLAY="${DISPLAY:-:0}" "{runtime}/config/files/loraham_voice"'
  build_steps = [ { argv = ["gcc", "-o", "loraham_voice", "loraham_voice_v107.c", "{pkgconfig:gtk+-3.0}", "-lcodec2", "-lasound", "-lncurses", "-lpthread", "-lm"] } ]
  pre_steps = [ { kind = "mkdir", path = "{runtime}/config/files" }, { kind = "symlink", src = "{source}/loraham_voice", dst = "{runtime}/config/files/loraham_voice" } ]
  run_argv = ["{runtime}/config/files/loraham_voice"]
  run_cwd = "{runtime}/config/files"
  run_env = { DISPLAY = "@env:DISPLAY=:0" }
  readiness = "process"
  note = "GTK desktop app (needs a display/X server + an audio capture/playback device). lhpc seeds loraham_voice.conf (callsign, audio devices, per-band radio params); the in-app config dialog still works and saves back to it."

    [[stack.component.require]]
    # VOICE-ONLY, and Voice is skipped by default on a headless rig — so this joins the same
    # explicit opt-in scope as the GTK dep rather than sitting in every headless bootstrap. No
    # other stack declares it, so the core-wins AND-merge leaves it opt-in.
    gui = true
    check_file = "/usr/include/codec2/codec2.h"
    install = "sudo apt install -y libcodec2-dev"
    note = "Codec2 development headers (Voice only)"
    [[stack.component.require]]
    # GUI-ONLY: libgtk-3-dev drags the whole GTK3/X11/Wayland/Pango/Cairo dev chain in, which has no
    # business on a headless Trixie lite image (a from-zero acceptance run was aborted over exactly
    # that). `gui = true` keeps it OUT of the default bootstrap; `--with-gui` installs it on a machine
    # that actually has a display. codec2/ALSA are Voice-only and share this opt-in scope; ncurses
    # is ALSO declared by chat, so the core-wins merge keeps it in the headless default.
    gui = true
    check_file = "/usr/include/gtk-3.0/gtk/gtk.h"
    install = "sudo apt install -y libgtk-3-dev"
    note = "GTK 3 development headers"
    [[stack.component.require]]
    # VOICE-ONLY audio capture/playback headers — same opt-in scope as codec2/GTK above.
    gui = true
    check_file = "/usr/include/alsa/asoundlib.h"
    install = "sudo apt install -y libasound2-dev"
    note = "ALSA development headers (Voice only)"
    [[stack.component.require]]
    check_file = "/usr/include/ncurses.h"
    install = "sudo apt install -y libncurses-dev"
    note = "ncurses development headers"

    [stack.component.source]
    path = "src/LoRaHAM_Voice"
    pin_commit = "d6028ff8e5b7491204678dcb14355e787952fa5c"
    pin_tag = "d6028ff"
    remote = "https://github.com/makrohard/LoRaHAM_Voice.git"
    branch = "main"
    local_dir = "LoRaHAM_Voice"
    artifact = true

    [stack.component.process]
    exec_name = "loraham_voice"

    [[stack.component.resource]]
    key = "audio.default"
    kind = "audio"
    mode = "exclusive"
    note = "Audio capture/playback device."

    # Seeded into {runtime}/config/files/loraham_voice.conf (KEY=VALUE, split on '=').
    # The app keeps both bands' params in one file; active_band selects which is used
    # (0=433, 1=868), defaulted from the band column the app was launched on.
    [stack.component.config_file]
    path = "{runtime}/config/files/loraham_voice.conf"
    fmt = "env"
      # Display order (Config + Start-confirm): CALL, then the LoRa radio params in the operator's
      # preferred order (freq sf bw cr crc preamble sync power ldro), then the rest. The radio params
      # are NOT hidden under "Advanced config" — they are shown inline with the basic ones.
      [[stack.component.config_file.param]]
      name = "callsign"
      validator = "callsign"
      key = "callsign"
      default = "{callsign}"
      label = "Callsign"
      # Per-band LoRa radio params: the file key carries {band}, so editing the 433 config writes
      # lora433_* and the 868 config writes lora868_* (one file holds both bands; active_band selects
      # which is used). Defaults match the app struct.
      [[stack.component.config_file.param]]
      name = "freq"
      key = "{band}_freq"
      validator = "freq"
      band_defaults = { "433" = "434.700", "868" = "869.525" }
      default = "434.700"
      label = "Frequency MHz"
      [[stack.component.config_file.param]]
      name = "sf"
      key = "{band}_sf"
      kind = "int"
      band_defaults = { "433" = "7", "868" = "11" }
      default = "7"
      min = 7
      max = 12
      label = "Spreading factor (SF)"
      [[stack.component.config_file.param]]
      name = "bw"
      key = "{band}_bw"
      kind = "enum"
      choices = ["7.8", "10.4", "15.6", "20.8", "31.25", "41.7", "62.5", "125.0", "250.0", "500.0"]
      band_defaults = { "433" = "125.0", "868" = "250.0" }
      default = "125.0"
      label = "Bandwidth kHz"
      [[stack.component.config_file.param]]
      name = "cr"
      key = "{band}_cr"
      kind = "int"
      band_defaults = { "433" = "5", "868" = "5" }
      default = "5"
      min = 5
      max = 8
      label = "Coding rate (4/CR)"
      [[stack.component.config_file.param]]
      name = "crc"
      key = "{band}_crc"
      kind = "enum"
      choices = ["0", "1"]
      band_defaults = { "433" = "1", "868" = "1" }
      default = "1"
      label = "CRC (0/1)"
      [[stack.component.config_file.param]]
      name = "preamble"
      key = "{band}_preamble"
      kind = "int"
      band_defaults = { "433" = "8", "868" = "16" }
      default = "8"
      min = 6
      max = 65535
      label = "Preamble length"
      [[stack.component.config_file.param]]
      name = "sync"
      key = "{band}_sync"
      validator = "sync"
      band_defaults = { "433" = "0x12", "868" = "0x2B" }
      default = "0x12"
      label = "Sync word (hex)"
      [[stack.component.config_file.param]]
      name = "power"
      key = "{band}_power"
      kind = "int"
      band_defaults = { "433" = "17", "868" = "10" }
      default = "17"
      min = 0
      max = 20
      label = "TX power dBm"
      [[stack.component.config_file.param]]
      name = "ldro"
      key = "{band}_ldro"
      kind = "enum"
      choices = ["0", "1", "2"]
      band_defaults = { "433" = "2", "868" = "2" }
      default = "2"
      label = "LDRO (0=off, 1=on, 2=auto)"
      # --- the rest (shown after the radio params) ---
      [[stack.component.config_file.param]]
      name = "codec_mode"
      key = "codec_mode"
      kind = "int"
      default = "0"
      min = 0
      max = 7
      label = "Codec2 mode index"
      [[stack.component.config_file.param]]
      name = "audio_capture"
      key = "audio_capture"
      default = "default"
      label = "Audio capture device (ALSA)"
      [[stack.component.config_file.param]]
      name = "audio_playback"
      key = "audio_playback"
      default = "default"
      label = "Audio playback device (ALSA)"
      # active_band (0=433, 1=868) is written automatically from the band the stack is started on —
      # hidden (not shown on the Config or Start-confirm pages).
      [[stack.component.config_file.param]]
      name = "active_band"
      key = "active_band"
      kind = "int"
      min = 0
      max = 1
      default = "0"
      band_defaults = { "433" = "0", "868" = "1" }
      hidden = true

# =====================================================================
# Stack: kiss — KISS/TCP TNC (+ optional serial PTY)
# =====================================================================
[[stack]]
id = "kiss"
name = "LoRaHAM KISS TNC"
summary = "Daemon-backed KISS/TCP TNC (port 8001) for APRS clients, with an optional serial PTY."
main = "loraham-kiss-tnc"

  [[stack.component]]
  id = "loraham-kiss-tnc"
  readiness = "endpoint"
  name = "LoRaHAM KISS/TCP TNC"
  kind = "service"
  band = "433"
  bands = ["433", "868"]
  purpose = "AX.25/KISS-over-TCP bridge for APRS clients; consumes the daemon sockets for the chosen band (433 or 868)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  requires_daemon_tx = "MANAGED"
  start_order = 1
  # loraham-kiss-tnc is now its OWN repo (flat layout): build.sh + the binary live at the checkout
  # root, and the binary is named after the checkout dir (src/loraham-kiss-tnc -> "loraham-kiss-tnc").
  # Explicit run_argv/build_steps + run_cwd so the root binary/script resolve cwd-relative.
  build = "bash build.sh"
  build_steps = [ { argv = ["bash", "build.sh"] } ]
  run = "./loraham-kiss-tnc --config loraham_kiss_tnc.conf.example {kiss_port} {kiss_host} {rx_freq} {tx_freq} {data_socket} {conf_socket} {rx_only} {verbose}"
  run_argv = ["./loraham-kiss-tnc", "--config", "loraham_kiss_tnc.conf.example", "{param:kiss_port}", "{param:kiss_host}", "{param:kiss_bind}", "{param:rx_freq}", "{param:tx_freq}", "{param:data_socket}", "{param:conf_socket}", "{param:rx_only}", "{param:verbose}"]
  run_cwd = "{source}"
  bin = "loraham-kiss-tnc"
  test = "bash run_tests.sh"

    # CLI overrides of the .conf file (all start-time). Band 868 uses its own
    # per-band config: set 868 frequencies + the lora868f/loraconf868 sockets there.
    [[stack.component.param]]
    name = "kiss_port"
    kind = "int"
    arg = "--kiss-port"
    default = "8001"
    min = 1
    max = 65535
    label = "KISS TCP port"
    # 868 LoRa-APRS uses the 869.4–869.65 MHz sub-band (g3: 10% duty / 500 mW) for
    # automated stations -> 869.525 MHz. 433 keeps the LoRa-APRS split (RX 433.775 /
    # TX 433.900). Per-band defaults are picked from the band the stack runs on.
    [[stack.component.param]]
    name = "rx_freq"
    validator = "freq"
    kind = "str"
    arg = "--rx-freq"
    band_defaults = { "433" = "433.775", "868" = "869.525" }
    default = "433.775"
    label = "RX frequency (MHz)"
    [[stack.component.param]]
    name = "tx_freq"
    validator = "freq"
    kind = "str"
    arg = "--tx-freq"
    band_defaults = { "433" = "433.900", "868" = "869.525" }
    default = "433.900"
    label = "TX frequency (MHz)"
    [[stack.component.param]]
    name = "kiss_bind"
    kind = "str"
    arg = "--bind"
    default = "127.0.0.1"
    validator = "bind"
    group = "Network exposure"
    label = "Allow-list — who may connect (127.0.0.1 = this Pi only; LAN CIDR or 0.0.0.0/0 to expose; NO auth)"
    [[stack.component.param]]
    name = "kiss_host"
    kind = "str"
    arg = "--kiss-host"
    default = "127.0.0.1"
    group = "Network exposure"
    label = "Bind host (advanced; overrides the --bind-derived address)"
    advanced = true
    [[stack.component.param]]
    name = "data_socket"
    kind = "str"
    validator = "path"
    arg = "--data-socket"
    band_defaults = { "433" = "/tmp/lora433f.sock", "868" = "/tmp/lora868f.sock" }
    default = "/tmp/lora433f.sock"
    label = "Daemon data socket"
    advanced = true
    [[stack.component.param]]
    name = "conf_socket"
    kind = "str"
    validator = "path"
    arg = "--conf-socket"
    band_defaults = { "433" = "/tmp/loraconf433.sock", "868" = "/tmp/loraconf868.sock" }
    default = "/tmp/loraconf433.sock"
    label = "Daemon config socket"
    advanced = true
    [[stack.component.param]]
    name = "rx_only"
    kind = "flag"
    flag = "--rx-only"
    label = "RX only (no TX)"
    advanced = true
    [[stack.component.param]]
    name = "verbose"
    kind = "flag"
    flag = "--verbose"
    label = "Verbose logging"
    advanced = true

    [stack.component.source]
    path = "src/loraham-kiss-tnc"
    pin_commit = "3a56c1c5137ca4e773037c727f0932419b96b516"
    pin_tag = "v0.5.0"
    remote = "https://github.com/makrohard/loraham-kiss-tnc.git"
    branch = "main"

    [stack.component.process]
    # Must match the ACTUAL binary basename (run_argv[0]/bin = "loraham-kiss-tnc", hyphens) — the
    # repo split renamed it from loraham_kiss_tnc; a stale underscore name made probe_process never
    # match the running TNC, so status read "stopped" and known-working refused to confirm it.
    exec_name = "loraham-kiss-tnc"

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:8001"
    ready = true
    role = "listener"
    description = "KISS over TCP"
    client = true
    scheme = "kiss"

    [[stack.component.resource]]
    key = "tcp.port.8001"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.433"
    kind = "daemon-socket"
    mode = "consumer"

  [[stack.component]]
  id = "loraham-kiss-serial"
  readiness = "process"
  name = "KISS serial (PTY)"
  kind = "service"
  band = "433"
  purpose = "Optional socat PTY <-> KISS/TCP(8001) bridge for serial-KISS clients."
  tx_capable = true
  optional = true
  depends_on = ["loraham-kiss-tnc"]
  start_order = 2
  run_argv = ["socat", "-d", "-d", "PTY,link={runtime}/state/loraham_kiss,raw,echo=0,waitslave,mode=666", "TCP:127.0.0.1:8001"]
  note = "Optional socat PTY <-> KISS/TCP(127.0.0.1:8001) bridge; exposes <runtime>/state/loraham_kiss (in-root; point external tools there). Runs socat DIRECTLY (not the wrapper script, which traps SIGTERM and respawns socat) so lhpc owns the socat process and stops it cleanly. Needs socat."

    [stack.component.source]
    path = "src/loraham-kiss-tnc"
    pin_commit = "3a56c1c5137ca4e773037c727f0932419b96b516"
    pin_tag = "v0.5.0"
    remote = "https://github.com/makrohard/loraham-kiss-tnc.git"
    branch = "main"

    [stack.component.process]
    exec_name = "socat"

    [[stack.component.require]]
    cmd = "socat"
    install = "sudo apt install socat"

    [[stack.component.endpoint]]
    kind = "path"
    address = "state/loraham_kiss"
    role = "provider"
    description = "Serial KISS PTY (socat)"
    client = true
    scheme = "serial"

    [[stack.component.resource]]
    key = "serial.loraham-kiss"
    kind = "serial"
    mode = "exclusive"

# =====================================================================
# Stack: meshtastic — native meshtasticd on 868 (direct SPI)
# =====================================================================
[[stack]]
id = "meshtastic"
name = "Meshtastic"
summary = "Native meshtasticd on the RF95 (433 or 868). Run ROOTLESS by lhpc as a user process. Direct SPI — conflicts with the LoRaHAM daemon."
main = "meshtastic"

  [[stack.component]]
  id = "meshtastic"
  name = "Meshtastic (meshtasticd)"
  kind = "service"
  band = "868"
  bands = ["433", "868"]
  purpose = "meshtasticd driving the RF95 directly; lhpc starts/stops it rootless with a runtime config."
  tx_capable = true
  pre = 'mkdir -p "{runtime}/state/meshtasticd/ssl"'
  # RUNTIME-OWNED binary, built from the managed source below. Never /usr/bin/meshtasticd: the
  # OBS package is built from the upstream `native-tft` environment and therefore links
  # X11/libinput/xkbcommon (and its Depends drag SDL2 -> PulseAudio/Wayland/Mesa/LLVM) onto a
  # headless rig. We build `native` instead — same upstream source, no display stack.
  run = "{runtime}/build/tools/meshtasticd/meshtasticd -c {runtime}/config/files/meshtasticd.yaml -d {runtime}/state/meshtasticd"
  pre_steps = [ { kind = "mkdir", path = "{runtime}/state/meshtasticd/ssl" } ]
  readiness = "endpoint"
  # THREE managed artifacts, all inside the runtime root: the server-only meshtasticd binary, the
  # browser UI that belongs to the SAME source revision, and the Meshtastic Python CLI.
  #
  # meshtasticd is built from the pinned source with upstream's own `native` PlatformIO
  # environment. `native-tft` (what the OBS package ships) adds `-lX11 -linput -lxkbcommon` for the
  # on-device MUI, which a headless rig can never use; `native` has none of that while keeping the
  # web server (`+<mesh/raspihttp/>`), the TCP API and RF95 SPI/GPIO. The link gate below PROVES the
  # produced binary is clean rather than trusting the flags.
  #
  # The CLI is pinned exactly: 2.7.11 is a pure-python wheel (py3-none-any) declaring >=3.9,<3.15,
  # verified to install and run on aarch64. It applies the LoRa region after start — without it the
  # node comes up region-UNSET and silently cannot transmit. No `--only-binary=:all:`: its
  # transitive wheels resolve on arm64 today, and forcing the flag would turn a future source-only
  # dep into a hard failure.
  #
  # `announce` = quiet-step preamble: pio/pip buffer their output off-TTY, so these steps can run
  # silent for a long time on a Zero 2W and a 0-byte log reads as hung.
  build_steps = [
    { argv = ["python3", "-m", "venv", "{runtime}/build/tools/platformio/.venv"] },
    { argv = ["{runtime}/build/tools/platformio/.venv/bin/pip", "install", "--disable-pip-version-check", "platformio==6.1.19"], announce = "[install] PlatformIO 6.1.19 into {runtime}/build/tools/platformio/.venv — pip is quiet off-TTY; progress: watch {runtime}/build/tools/platformio/.venv/lib grow" },
    { argv = ["{runtime}/build/tools/platformio/.venv/bin/pio", "pkg", "install", "--environment", "native"], env = { PLATFORMIO_CORE_DIR = "{runtime}/build/tools/platformio/core" }, announce = "[resolve] Meshtastic native platform + libraries — large download, output is quiet; progress: watch {runtime}/build/tools/platformio/core grow" },
    { argv = ["{runtime}/build/tools/platformio/.venv/bin/pio", "run", "--environment", "native"], env = { PLATFORMIO_CORE_DIR = "{runtime}/build/tools/platformio/core", PLATFORMIO_RUN_JOBS = "1" }, announce = "[build] meshtasticd (upstream env: native — server-only, no TFT/SDL/X11) — a full C++ build; slow on a Zero 2W; progress: watch {source}/.pio/build/native grow" },
    { argv = ["install", "-D", "-m", "0755", "{source}/.pio/build/native/meshtasticd", "{runtime}/build/tools/meshtasticd/meshtasticd"] },
    { argv = ["bash", "{asset}/scripts/meshtastic-link-gate.sh", "{runtime}/build/tools/meshtasticd/meshtasticd"] },
    { argv = ["bash", "{asset}/scripts/meshtastic-web-assets.sh", "{source}", "{runtime}/build/tools/meshtasticd/web", "6de6c3d6dc8df1ff188f447b2446a799b4acbdbd", "a34f4360a0486543a698de20de533557492e763ab459fc27fcea95d0495144ed"], announce = "[fetch] Meshtastic web UI for this checkout (bin/web.version) — the declared sha256 is enforced only when HEAD IS the pinned commit" },
    { argv = ["python3", "-m", "venv", "{runtime}/build/tools/meshtastic-cli/.venv"] },
    { argv = ["{runtime}/build/tools/meshtastic-cli/.venv/bin/pip", "install", "--disable-pip-version-check", "meshtastic==2.7.11"], announce = "[install] Meshtastic CLI 2.7.11 into {runtime}/build/tools/meshtastic-cli/.venv — pip is quiet off-TTY and pulls protobuf/pyserial/bleak; progress: watch {runtime}/build/tools/meshtastic-cli/.venv/lib grow" },
  ]
  # The server binary IS the primary artifact. The strict completion marker is written only after
  # EVERY step above succeeds — so a source update (which clears the marker) reads "Build required"
  # until the new revision's binary AND its matching web assets are both in place.
  bin = "build/tools/meshtasticd/meshtasticd"
  # STRICT SOURCE-LOCAL completion marker: written only after the LAST build step succeeds, so a run
  # interrupted after the binary is installed but before the web UI is provisioned reads NOT built.
  # It lives in the source checkout, so replacing that checkout (update / a different selector) takes
  # the marker with it and the stack reads "Build required" until the new revision is rebuilt —
  # which is exactly what must happen when the source moves.
  build_marker = ".lhpc-build-complete"
  # A native C++ firmware build on a Zero 2W is long; the platform/library resolve alone can run
  # for many minutes over slow Wi-Fi. Ceiling set from LIVE measurement (not a guess): a Pi Zero 2W
  # (512 MB, one-job compile) builds up to ~900 objects at ~3-6 objects/min, so a cold build runs
  # ~2.5-5 h. 4 h could be crossed on the slowest supported board and kill the run just before the
  # link step; 6 h clears the pessimistic case with margin. A Pi 5 finishes far inside it.
  build_timeout = 21600.0
  # After meshtasticd is listening on the API, set the LoRa region — REQUIRED: a node whose region
  # is UNSET may not transmit, so a failed region push must fail the start (and trigger the verified
  # cleanup) instead of leaving a silently mute node. Node identity stays optional (a cosmetic
  # setting), but its outcome is recorded in the post-start sidecar and shown by `lhpc status`.
  # Both invoke the MANAGED CLI by absolute path via `paths` — never whatever `meshtastic` happens
  # to be on PATH.
  post_steps = [
    { kind = "delay", seconds = 12 },
    { kind = "exec", label = "region", required = true, argv = ["meshtastic", "--host", "127.0.0.1", "--set", "lora.region", "{param:region}"], paths = ["{runtime}/build/tools/meshtastic-cli/.venv/bin/meshtastic"] },
    { kind = "exec", label = "node identity", optional = true, argv = ["meshtastic", "--host", "127.0.0.1", "--set-owner", "{param:node_name}", "--set-owner-short", "{param:node_short}"], paths = ["{runtime}/build/tools/meshtastic-cli/.venv/bin/meshtastic"] },
  ]
  note = "ONE-TIME setup (free the radio + stop the packaged service auto-starting): `sudo systemctl disable --now meshtasticd`. SPI must be enabled (config.txt: dtparam=spi=on, dtoverlay=spi0-0cs). lhpc runs/stops it WITHOUT root ONLY WHEN you are in the spi+gpio groups — see System dependencies below; grant with the shown command (then log out/in or reboot) if missing. Shares the SPI radio with the LoRaHAM daemon. Region + node name are applied automatically after start (config: Region / Node name)."

    [[stack.component.param]]
    name = "region"
    kind = "enum"
    choices = ["EU_868", "EU_433", "US", "ANZ", "CN", "JP", "KR", "IN", "RU", "UA_868", "UNSET"]
    default = "EU_868"
    band_defaults = { "433" = "EU_433", "868" = "EU_868" }
    label = "LoRa region (sets TX legality; required for TX)"
    [[stack.component.param]]
    name = "node_name"
    validator = "node"
    kind = "str"
    default = "LoRaHAM Pi"
    label = "Node name (long)"
    [[stack.component.param]]
    name = "node_short"
    validator = "node_short"
    kind = "str"
    default = "LHPi"
    label = "Node name (short, max 4 chars)"

    # A NORMAL managed Git source, so Meshtastic gets the ordinary pinned / stable / dev selectors
    # and the existing Check / Update / Build flows — no bespoke update path. `pinned` (the
    # known-good default) is the master commit built + run-proven on the 2026-07 Zero 2W
    # acceptance runs (native build, uputronics dual HAT, 868 up + region applied).
    # Selecting `dev` clones and builds the configured development branch normally.
    # The config template still ships WITH lhpc (config_file.base = {asset}/…), so nothing is
    # cloned merely to read a yaml.
    [stack.component.source]
    path = "src/meshtastic-firmware"
    pin_commit = "6de6c3d6dc8df1ff188f447b2446a799b4acbdbd"
    pin_tag = "v2.7.26.54e0d8d-28-g6de6c3d6d"
    remote = "https://github.com/meshtastic/firmware.git"
    branch = "master"
    local_dir = "meshtastic-firmware"

    [stack.component.process]
    exec_name = "meshtasticd"

    [[stack.component.require]]
    # curl + ca-certificates fetch the web UI release for this checkout (HTTPS, sha256-verified).
    cmd = "curl"
    install = "sudo apt install -y ca-certificates curl"
    note = "TLS certs + curl — used to fetch the sha256-verified Meshtastic web UI archive."
    [[stack.component.require]]
    # BUILD-TIME libraries for upstream's `native` environment, and the RUNTIME libraries the
    # produced binary links. This is the COMPLETE set — deliberately no SDL2, X11, Wayland, Mesa,
    # LLVM, PulseAudio, libinput or xkbcommon: those belong to the `native-tft` on-device UI we do
    # not build, and the OBS package's own `libsdl2-2.0-0` Depends is overdeclared (its binary
    # never links SDL) yet is what dragged the desktop cascade onto a headless image.
    check_file = "/usr/include/yaml-cpp/yaml.h"
    install = "sudo apt install -y libyaml-cpp-dev libuv1-dev libgpiod-dev libi2c-dev libusb-1.0-0-dev libulfius-dev libssl-dev libbluetooth-dev pkg-config"
    note = "Build+runtime libraries for the server-only meshtasticd (yaml-cpp, libuv, gpiod, i2c, usb, ulfius/orcania for the web server, OpenSSL, BlueZ)."
    [[stack.component.require]]
    # The MANAGED Meshtastic CLI venv (provisioned by build_steps above; the OBS package ships only
    # the daemon). NO `cmd` key ON PURPOSE: missing_requirements ORs cmd/check_file, so adding
    # `cmd = "meshtastic"` would let an unmanaged, unpinned copy that merely happens to be on PATH
    # satisfy this gate — the exact ambiguity this requirement exists to remove.
    # `provisioned = true` keeps it OUT of the install/system-dep gate (it is not an apt package the
    # operator installs) while missing_requirements still BLOCKS START, so a box that never built it
    # is refused up front instead of starting and silently failing to apply the region.
    check_file = "{runtime}/build/tools/meshtastic-cli/.venv/bin/meshtastic"
    provisioned = true
    install = "lhpc build meshtastic"
    note = "Managed Meshtastic Python CLI (pinned venv inside the runtime root) — applies the LoRa region after start; without it the node cannot transmit."
    [[stack.component.require]]
    check_file = "/dev/spidev0.0"
    install = "printf 'dtparam=spi=on\\ndtoverlay=spi0-0cs\\n' | sudo tee -a /boot/firmware/config.txt"
    note = "SPI device (RF95 on SPI0). REBOOT after enabling. The spi0-0cs overlay exposes ONLY /dev/spidev0.0 (zero kernel chip-selects — correct for LoRaHAM Pi / Uputronics rigs INCLUDING dual Uputronics: daemon + meshtasticd drive CS7/CS8 as GPIOs, field-verified). Only a board that really uses kernel-driven CE0/CE1 uses plain 'dtparam=spi=on' WITHOUT the overlay (NOT Uputronics — kernel CE0/CE1=GPIO7/8 would collide with the daemon's GPIO chip-selects)."
    [[stack.component.require]]
    groups = ["spi", "gpio"]
    install = "sudo usermod -aG spi,gpio $USER"
    note = "spi + gpio group membership — needed to run meshtasticd WITHOUT root"
    [[stack.component.require]]
    # MUST-NOT-RUN: the apt package enables a ROOT meshtasticd.service that seizes the SPI radio, so this
    # rootless stack can never own it. Its enabled wants-symlink must be ABSENT; present => START is
    # blocked with the disable command. (A service that is active but NOT enabled has no symlink and is
    # surfaced at run time instead — see _conflicting_service_hint.)
    absent_file = "/etc/systemd/system/multi-user.target.wants/meshtasticd.service"
    install = "sudo systemctl disable --now meshtasticd"
    note = "the packaged root meshtasticd.service must be disabled — it grabs the SPI radio and blocks this rootless stack"

    # meshtasticd YAML config generated per band (the Lora pins differ between the 433 and
    # 868 boards) from the base SHIPPED WITH lhpc (`{asset}/…` = package data, read at
    # generation time — no clone to fetch it, and it can never go stale against the installed
    # version the way a bootstrap-seeded copy would).
    # Written to the runtime root so no root is needed; run uses -c on it.
    # The WEB PORT is NOT a parameter: it is fixed at 9443 in the packaged base because the
    # declared endpoint below, the dashboard link, the stackweb nginx upstream and the
    # "exposed on all interfaces" audit ALL derive from that endpoint address. A settable port
    # moved only the generated yaml and silently broke every one of them (the readiness probe,
    # the clickable link and the exposure warning would all watch a dead 9443).
    # Node identity (owner long/short) is a DEVICE setting saved in the node's
    # prefs, not the YAML — so it is set via the API after start (see post_steps),
    # not here. This file holds the hardware/web/log config only.
    [stack.component.config_file]
    path = "{runtime}/config/files/meshtasticd.yaml"
    fmt = "yaml-update"
    base = "{asset}/bases/meshtasticd.yaml"
      [[stack.component.config_file.param]]
      name = "ssl_key"
      key = "SSLKey"
      section = "Webserver"
      kind = "str"
      default = "{runtime}/state/meshtasticd/ssl/private_key.pem"
      validator = "path"
      label = "SSL key path (writable, for rootless web)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "ssl_cert"
      key = "SSLCert"
      section = "Webserver"
      kind = "str"
      default = "{runtime}/state/meshtasticd/ssl/certificate.pem"
      validator = "path"
      label = "SSL cert path (writable, for rootless web)"
      advanced = true
      [[stack.component.config_file.param]]
      # The browser UI is a RUNTIME-OWNED artifact provisioned by the build from this checkout's
      # bin/web.version — never /usr/share/meshtasticd/web, which only exists if the OBS package
      # we replaced is installed and would serve a UI from an unrelated revision.
      name = "web_root"
      key = "RootPath"
      section = "Webserver"
      kind = "str"
      default = "{runtime}/build/tools/meshtasticd/web"
      validator = "path"
      label = "Web UI root (provisioned by the build)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "loglevel"
      key = "LogLevel"
      section = "Logging"
      kind = "enum"
      choices = ["debug", "info", "warn", "error"]
      default = "info"
      label = "Log level"
      advanced = true
      [[stack.component.config_file.param]]
      name = "max_nodes"
      key = "MaxNodes"
      section = "General"
      kind = "int"
      default = "200"
      label = "Max nodes"
      advanced = true
      [[stack.component.config_file.param]]
      name = "ble"
      key = "BLE"
      section = "Interfaces"
      kind = "flag"
      label = "Bluetooth interface"
      advanced = true
      [[stack.component.config_file.param]]
      name = "mqtt"
      key = "MQTT"
      section = "Interfaces"
      kind = "flag"
      label = "MQTT interface"
      advanced = true
      [[stack.component.config_file.param]]
      name = "cs"
      key = "CS"
      section = "Lora"
      kind = "int"
      default = "7"
      band_defaults = { "433" = "8", "868" = "7" }
      label = "Lora CS pin"
      advanced = true
      [[stack.component.config_file.param]]
      name = "irq"
      key = "IRQ"
      section = "Lora"
      kind = "int"
      default = "16"
      band_defaults = { "433" = "25", "868" = "16" }
      label = "Lora IRQ pin (DIO0)"
      advanced = true
      # OPTIONAL-ABSENT (no default, no band_defaults). The Uputronics RF95 boards have NO reset line
      # (NC, vendor-confirmed) and NO Busy pin (RF95 has none — the old "DIO1" label was wrong). Writing
      # Reset: 6 makes meshtasticd assert-abort (gpiod_line_request_reconfigure_lines 'request' failed)
      # because BCM 6/13 are the LoRaHAM daemon's LEDs — so when unset (the default for these boards)
      # `omit_if_empty` OMITS the key entirely rather than writing a harmful pin. Left advanced so an
      # exotic board that GENUINELY has the pin can still set it.
      [[stack.component.config_file.param]]
      name = "reset"
      key = "Reset"
      section = "Lora"
      kind = "int"
      omit_if_empty = true
      label = "Lora Reset pin (leave empty for Uputronics — no reset line)"
      advanced = true
      [[stack.component.config_file.param]]
      name = "busy"
      key = "Busy"
      section = "Lora"
      kind = "int"
      omit_if_empty = true
      label = "Lora Busy pin (leave empty for Uputronics — RF95 has no busy pin)"
      advanced = true

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:4403"
    ready = true
    role = "listener"
    description = "Meshtastic API"
    client = true
    scheme = "tcp"
    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:9443"
    role = "listener"
    description = "Meshtastic web GUI"
    client = true
    scheme = "https"

    [[stack.component.resource]]
    key = "loraham.radio.868"
    kind = "radio-band"
    mode = "exclusive"
    note = "Owns the RF95 -> conflicts with the LoRaHAM daemon (shared SPI radio)."
    [[stack.component.resource]]
    key = "loraham.radio.433"
    kind = "radio-band"
    mode = "exclusive"

# =====================================================================
# Stack: meshcom — MeshCom firmware in QEMU (433 DIRECT)
# =====================================================================
[[stack]]
id = "meshcom"
name = "MeshCom (QEMU)"
summary = "MeshCom firmware under QEMU, bridged to the daemon. 433 MHz, daemon DIRECT. Order: daemon -> bridge -> GPS -> QEMU."
main = "meshcom-qemu"

  [[stack.component]]
  id = "meshcom-bridge"
  name = "MeshCom <-> LoRaHAM bridge"
  kind = "service"
  band = "433"
  purpose = "TCP(7000) <-> daemon Unix-socket bridge (--backend loraham)."
  tx_capable = true
  depends_on = ["loraham-daemon"]
  # The QEMU MeshCom firmware has NO real radio (EXTERNAL_RADIO): its own MAC/CAD cannot
  # touch the channel, so channel access is delegated to the daemon. The bridge itself
  # forces "SET TXMODE=MANAGED" on connect (loraham_backend.cpp), so the declared mode must
  # match MANAGED — declaring DIRECT here only made lhpc set+verify DIRECT moments before
  # the bridge flipped it back to MANAGED.
  requires_daemon_tx = "MANAGED"
  start_order = 1
  build = "cmake -S . -B build && cmake --build build"
  build_steps = [ { argv = ["cmake", "-S", ".", "-B", "build"] }, { argv = ["cmake", "--build", "build"] } ]
  readiness = "endpoint"
  run = "build/meshcom-loraham-bridge {bind} {port} {backend} {password_file} {ping_interval} {pong_timeout}"
  bin = "build/meshcom-loraham-bridge"
  # Deterministic, hardware-free host test: the bridge's own CTest suite (FakeBackend by default —
  # no daemon, no QEMU, no radio). The build step above already compiles the test binaries +
  # build/CTestTestfile.cmake, so auto-install runs this right after the build. COMPONENT-level key
  # (must precede the [[…param]] sub-tables, else TOML binds it to the last param table and it is
  # lost — same gotcha as meshcom-qemu's test).
  test = "ctest --test-dir build --output-on-failure"

    [[stack.component.require]]
    check_file = "/usr/include/openssl/ssl.h"
    install = "sudo apt install -y libssl-dev"
    note = "OpenSSL development headers (meshcom build)"

    # Bridge CLI (start-time). RF params are NOT CLI — they arrive from the firmware
    # over the XR protocol. The port must match the firmware's EXTERNAL_RADIO_PORT.
    [[stack.component.param]]
    name = "port"
    kind = "int"
    arg = "--port"
    default = "7000"
    min = 0
    max = 65535
    label = "Control TCP port (= firmware XR_PORT)"
    [[stack.component.param]]
    name = "bind"
    validator = "host"
    kind = "str"
    arg = "--bind"
    default = "127.0.0.1"
    label = "Bind address (loopback recommended)"
    advanced = true
    [[stack.component.param]]
    name = "backend"
    kind = "enum"
    choices = ["loraham", "fake"]
    arg = "--backend"
    default = "loraham"
    label = "Radio backend (fake = no RF)"
    advanced = true
    [[stack.component.param]]
    name = "password_file"
    kind = "str"
    validator = "path"
    arg = "--password-file"
    default = ""
    label = "HMAC password file (blank = open auth)"
    advanced = true
    # XR KEEPALIVE, QEMU-STACK deployment values (live finding): the firmware runs under
    # QEMU/TCG, whose stalls (JIT warmup, GC, SD-card contention) delay a PONG by tens of
    # seconds. The bridge-binary defaults (ping 15 s / pong 10 s — right for real hardware)
    # made every session flap: connect -> configured -> "disconnected: pong-timeout" in a
    # continuous cycle, and GUI-to-air latency became ~30 s of wait-for-next-reconnect.
    # 30 s / 90 s keeps one stable session across TCG stalls; the bridge WARNs with the
    # measured RTT when a pong rides the deadline, so degradation is visible before drops.
    [[stack.component.param]]
    name = "ping_interval"
    kind = "int"
    arg = "--ping-interval-ms"
    default = "30000"
    min = 1
    max = 3600000
    label = "XR keepalive PING interval, ms (bridge default 15000 suits real HW; QEMU/TCG needs more)"
    advanced = true
    [[stack.component.param]]
    name = "pong_timeout"
    kind = "int"
    arg = "--pong-timeout-ms"
    default = "90000"
    min = 1
    max = 3600000
    label = "XR keepalive PONG timeout, ms (bridge default 10000 flaps under QEMU/TCG stalls)"
    advanced = true

    [stack.component.source]
    path = "src/meshcom-loraham-bridge"
    pin_commit = "f0189206a6657f63c02f12aedb74b99fa525bd98"
    pin_tag = "f018920"
    remote = "https://github.com/makrohard/meshcom-loraham-bridge.git"
    branch = "main"

    [stack.component.process]
    exec_name = "meshcom-loraham-bridge"

    [[stack.component.endpoint]]
    kind = "tcp"
    address = "127.0.0.1:7000"
    ready = true
    role = "listener"
    description = "MeshCom firmware client port."

    [[stack.component.resource]]
    key = "tcp.port.7000"
    kind = "tcp-port"
    mode = "exclusive"
    [[stack.component.resource]]
    key = "loraham.daemon-socket.433"
    kind = "daemon-socket"
    mode = "consumer"
    [[stack.component.resource]]
    key = "loraham.profile.433"
    kind = "daemon-profile"
    mode = "requirement"
    requirement = "MANAGED"

  [[stack.component]]
  id = "meshcom-gps-relay"
  readiness = "process"
  name = "MeshCom GPS relay"
  kind = "service"
  purpose = "Feeds NMEA into the QEMU node's virtual UART1 (fixture or host gpsd)."
  tx_capable = false
  optional = true
  start_order = 2
  run = "python3 scripts/gps-relay.py --mode fixture --fixture fixtures/gps/valid_fix.nmea --uart .run/gps-uart1.sock {rate} {loop}"
  # MUST precede the [[…param]] sub-tables (TOML binds trailing bare keys to the LAST table).
  note = "Optional. Start before the node: GPS init is one-shot."

    # Fixture-replay knobs (start-time). mode/fixture/uart stay fixed (gpsd mode
    # would need --fixture removed — switch it by editing the run line).
    [[stack.component.param]]
    name = "rate"
    kind = "str"
    arg = "--rate"
    default = "5"
    label = "Fixture sentences/sec"
    [[stack.component.param]]
    name = "loop"
    kind = "flag"
    flag = "--loop"
    default = "on"
    label = "Replay continuously"

    [stack.component.source]
    path = "src/meshcom-qemu-raspi"
    pin_commit = "83a8131c419e6f5ca3481344e06e8875454c5a86"
    pin_tag = "83a8131"
    remote = "https://github.com/makrohard/meshcom-qemu-raspi.git"
    branch = "main"

    [stack.component.process]
    exec_name = "python3"
    all_args = ["gps-relay.py"]

  [[stack.component]]
  id = "meshcom-qemu"
  name = "MeshCom QEMU node"
  kind = "service"
  band = "433"
  purpose = "Runs MeshCom firmware headless under QEMU (web 18083, net-console 12323)."
  tx_capable = true
  depends_on = ["meshcom-bridge", "meshcom-gps-relay"]
  start_order = 3
  # Shown as a transient note right after start — the emulated node is slow to boot, so set
  # expectations (and steer heavy GUI viewing off this Pi during boot).
  start_note = "MeshCom node launched under QEMU — the emulated firmware boots in ~1 min on a Pi 5 and ~5–6 min on a Pi Zero 2W. Its web UI at :18083 is sluggish until then, and its callsign switches to yours once the node finishes booting."
  # The EXTERNAL_RADIO firmware bakes the bridge host/port (and optional HMAC
  # password) from the XR_* env vars — the qemu overlay's platformio.ini reads
  # ${sysenv.XR_HOST}/${sysenv.XR_PORT}. Without them set, -D EXTERNAL_RADIO_PORT=
  # is empty and the build fails. 10.0.2.2 = QEMU user-net gateway -> host; 7000 =
  # the meshcom-bridge default port; password (if any) from /tmp/xr_pw.
  build = 'env XR_HOST=10.0.2.2 XR_PORT=7000 XR_PASSWORD="$(cat {runtime}/config/secrets/xr_pw 2>/dev/null)" scripts/build.sh --env qemu-headless-extradio-gpsd'
  # SELF-SUFFICIENT fresh clone: the workspace (.work/ MeshCom firmware + overlay +
  # OpenETH vendor) is prepared by the repo's own pinned setup scripts before build.sh —
  # a linked dev tree used to carry a pre-built .work/, a managed clone must not.
  # The firmware source MUST be the external-radio feature branch: the default
  # (upstream icssw-org pinned tag) has NO external-radio transport, so the extradio
  # build boots with "LoRa radio disabled (no backend)" and never talks to the bridge —
  # no messages in either direction (live finding).
  # SELF-CONTAINED tools, located-and-versioned INSIDE the runtime root (no reliance on $HOME/pipx):
  #  * PlatformIO -> a managed venv at {root}/build/tools/platformio (retires the pipx system dep;
  #    passed to the build scripts by ABSOLUTE path via PIO=). pipx stays a documented standalone-dev
  #    alternative.
  #  * QEMU (qemu-system-xtensa) -> build-qemu.sh builds it FROM SOURCE at the pinned Espressif commit,
  #    HEADLESS (no SDL/GTK/VNC/OpenGL/audio), transactionally into {root}/build/tool-cache; the produced
  #    binary is LINK-GATED (no display/audio library) and hashed before its marker is written. run.sh
  #    receives the resolved binary via the `qemu` param (default below). This replaces the prebuilt
  #    Espressif tarball, which hard-links libSDL2 and cannot load on a headless box (the source build has
  #    no such dependency). The prebuilt tarball path (scripts/fetch-qemu.sh, offline via LHPC_QEMU_TARBALL)
  #    remains a documented MANUAL opt-in, but is no longer part of the managed build.
  # PLATFORMIO_CORE_DIR is an explicit RUNTIME-OWNED package/tool cache under the root, passed to BOTH
  # framework-install (prepare-openeth) and build (build.sh) so a CLI build and a web-service build use
  # the SAME in-root store (prepare-openeth.sh/build.sh honor `${PLATFORMIO_CORE_DIR:-$HOME/.platformio}`).
  # `announce` = quiet-step preamble written as the step log's FIRST content: pio/pip/git buffer
  # their output off-TTY, so these steps run silent for minutes on a Zero 2W over slow Wi-Fi
  # (field finding: the platform/toolchain resolve ran >10 min with a 0-byte log — reads as hung).
  build_steps = [
    { argv = ["python3", "-m", "venv", "{runtime}/build/tools/platformio/.venv"] },
    { argv = ["{runtime}/build/tools/platformio/.venv/bin/pip", "install", "--disable-pip-version-check", "platformio==6.1.19"], announce = "[install] PlatformIO 6.1.19 into {runtime}/build/tools/platformio/.venv — pip is quiet off-TTY; progress: watch {runtime}/build/tools/platformio/.venv/lib grow" },
    { argv = ["scripts/build-qemu.sh", "{runtime}/build/tool-cache/qemu-xtensa/esp_develop_9.0.0_20240606", "--link-gate", "{asset}/scripts/meshtastic-link-gate.sh"], announce = "[build] qemu-system-xtensa FROM SOURCE (headless: no SDL/GTK/VNC/OpenGL/audio) at the pinned Espressif commit — clone + configure + compile, slow + silent off-TTY; progress: watch {runtime}/build/tool-cache/qemu-xtensa grow" },
    { argv = ["scripts/setup.sh", "--src", "https://github.com/makrohard/MeshCom-Firmware.git", "--ref", "feature/external-radio-tcp-draft"], announce = "[clone] MeshCom-Firmware (feature/external-radio-tcp-draft) into the .work/ workspace — git is quiet off-TTY; progress: watch {source}/.work grow" },
    { argv = ["scripts/apply-overlay.sh"] },
    { argv = ["scripts/prepare-openeth.sh"], env = { PIO = "{runtime}/build/tools/platformio/.venv/bin/pio", PLATFORMIO_CORE_DIR = "{runtime}/build/tools/platformio/core" }, announce = "[resolve] ESP32 platform + toolchain — large download, output is quiet; progress: watch {runtime}/build/tools/platformio/core grow" },
    { argv = ["scripts/build.sh", "--env", "qemu-headless-extradio-gpsd"], env = { PIO = "{runtime}/build/tools/platformio/.venv/bin/pio", PLATFORMIO_CORE_DIR = "{runtime}/build/tools/platformio/core", XR_HOST = "10.0.2.2", XR_PORT = "7000", XR_PASSWORD = "@file?:{runtime}/config/secrets/xr_pw" } },
  ]
  readiness = "endpoint"
  # The emulated ESP32 boots slowly — live-measured ~1 min on a Pi 5 and ~5–6 min on a Pi Zero 2W to
  # console-ready (run-2/3 + the 2026-07-23 debug session; the old "~190 s" figure was one lucky Zero
  # run). The ready ENDPOINTS (net-console/web sockets) usually open much earlier, but a heavily
  # loaded Zero can be slow even to open them — 600 s so the window never TERM-kills a boot that
  # just needs minutes. The start path prints the component's start_note before polling.
  readiness_timeout = 600.0
  run = "scripts/run.sh {env} {qemu}"
  # RX-safe host test (verifies the guest serves the MeshCom web UI + net-console and no radio
  # is active). SELF-SUFFICIENT: when no guest is running, test.sh boots the newest built env
  # itself and stops exactly that instance afterwards — so auto-install runs it right after the
  # build (no running stack needed). A guest that is already running is probed and left alone.
  # The MANAGED qemu path is passed explicitly: test.sh's self-boot otherwise inherits run.sh's
  # PATH/IDF discovery, which cannot find the in-root source build on a fresh install (live find:
  # Pi 5 reinstall failed exactly here while every box with a legacy ~/.espressif passed).
  # MUST be a COMPONENT-level key — placed after the [[…param]] sub-tables it would bind to the
  # last param table (TOML), leaving the component with no test ("skipped (no host tests)").
  test = "scripts/test.sh --qemu {runtime}/build/tool-cache/qemu-xtensa/esp_develop_9.0.0_20240606/qemu/bin/qemu-system-xtensa"
  # The build artifact is the merged firmware flash image for the chosen env, NOT
  # qemu-system-xtensa (the system emulator that run.sh locates separately).
  bin = ".work/MeshCom-Firmware/.pio/build/{env}/flash.bin"
  # Per-STEP budget. The heaviest step is now the from-source QEMU compile: on a Pi Zero 2W (2 cores
  # usable at -j1 under memory pressure) a full QEMU build can run for hours, so this is sized for the
  # Zero's first cold QEMU build with margin. The `pio` firmware build (~26 min cold on a Zero, field-
  # measured) sits comfortably inside it. A slow step is never silently TERM-killed mid-build.
  build_timeout = 28800.0
  # AUTHORITATIVE completion marker, co-located WITH the firmware artifact (same .pio/build/<env> dir as
  # flash.bin). build() removes it before the FIRST step and writes it ONLY after the LAST step succeeds,
  # and is_built() gates on it — so a stale flash.bin from an earlier build can NEVER read "built" after a
  # failed/interrupted rebuild. Cleaning the firmware (rm .pio/build/<env>) removes the marker with it.
  # The env matches the build_steps' hardcoded `--env qemu-headless-extradio-gpsd` (build_marker is a
  # literal path — no {env} substitution — so it must name the concrete env the build produces).
  build_marker = ".work/MeshCom-Firmware/.pio/build/qemu-headless-extradio-gpsd/.lhpc-build-complete"
  # MeshCom's callsign is a NODE setting applied over the net-console (12323) and stored in
  # flash/NVS (survives restarts). Wait for the port, then push `--setcall` — no nc/shell. QEMU
  # opens 12323 almost immediately, but the firmware needs ~a minute to boot before it accepts a
  # command, so re-send over a window until it lands (idempotent). `skip_if_param` sends NO
  # --setcall for an empty / N0CALL callsign (the structured equivalent of the old shell guard).
  post_steps = [
    { kind = "tcp_wait", port = 12323, timeout = 180 },
    # ACK-AWARE + IDEMPOTENT (live finding: 17 blind connects starved the node's heap
    # and killed its web UI): probe `--info` first and SKIP when the callsign is already
    # set (it persists in NVS across restarts); otherwise send until the firmware ACKs
    # ("Call:<CALL> ... set") — ONE acknowledged send, never the full blind window.
    # probe_stop_on matches --info's DISPLAY format `...Call: <DJ0CHE-1>` (space + angle
    # brackets); stop_on matches the setcall ACK `Call:DJ0CHE-1 Short:... set`. They DIFFER —
    # with the ACK pattern used for the probe too, a persisted callsign was never detected, so
    # every start re-sent --setcall, the firmware saved + auto-rebooted, and the QEMU guest
    # wedged in the bootloader (guest reset is not survivable in qemu-xtensa) — live finding.
    # ZERO-2W COLD-BOOT WINDOW (live finding): a QEMU/TCG cold boot on a Pi Zero 2W brings the
    # console up only after MINUTES — the old fixed window (repeat=21, interval=8 -> 168 s)
    # expired with every probe hitting a deaf console, zero sends, and the node ran with the
    # default callsign. The stepped `schedule` keeps the tight 8 s cadence for the first minute
    # (fast path on Pi 4/5 and warm boots), eases to 15 s, then a 30 s cap: 36 attempts over a
    # ~13 min window — well past the slowest observed cold boot, still only ~36 one-line
    # exchanges (no flooding by construction). The readiness probe still guarantees NO blind
    # send ever reaches a deaf console, and one acknowledged send still ends the window
    # immediately. `lhpc stack poststart meshcom` re-runs this against a running stack if the
    # window ever expires.
    { kind = "tcp_send", port = 12323, label = "callsign", data = "--setcall {param:mc_callsign}\n", probe = "--info\n", probe_stop_on = "Call: <{param:mc_callsign}>", stop_on = "Call:{param:mc_callsign}", schedule = [[8, 8], [6, 15], [22, 30]], skip_if_param = "mc_callsign", skip_values = ["", "N0CALL"] },
  ]

    [[stack.component.require]]
    check_file = "/usr/lib/aarch64-linux-gnu/libslirp.so.0"
    install = "sudo apt install -y libslirp0"
    note = "libslirp0 — QEMU user-mode networking; the Espressif qemu-system-xtensa (run.sh) aborts with 'libslirp.so.0 missing' without it. arm64/aarch64 path (this project's target)."
    # ---- QEMU-from-source build toolchain (scripts/build-qemu.sh) -----------------------------------
    # The managed emulator is now BUILT FROM SOURCE (headless, no display/audio) instead of fetching a
    # prebuilt tarball, so the build toolchain + the headless QEMU library dependencies are declared
    # here and installed by the generated bootstrap before the managed build runs. `git` replaces the
    # tarball's wget/xz-utils. Each require is a real per-capability check; build-qemu.sh re-checks the
    # same commands + pkg-config capabilities itself and fails closed if any is missing.
    [[stack.component.require]]
    cmd = "git"
    install = "sudo apt install -y git"
    note = "git — build-qemu.sh shallow-clones the pinned Espressif QEMU commit (NO submodules — the heavy roms/* firmware submodules are irrelevant to the xtensa emulator) to build from source."
    [[stack.component.require]]
    cmd = "gcc"
    install = "sudo apt install -y build-essential"
    note = "build-essential (gcc/g++/make/libc6-dev) — the C toolchain that compiles qemu-system-xtensa from source."
    [[stack.component.require]]
    cmd = "ninja"
    install = "sudo apt install -y ninja-build"
    note = "ninja-build — QEMU's build backend (meson generates ninja rules)."
    [[stack.component.require]]
    cmd = "meson"
    install = "sudo apt install -y meson"
    note = "meson — QEMU's build system. The SYSTEM meson is used deliberately: build-qemu.sh enforces a minimum SYSTEM-meson version, so a too-old meson FAILS the build rather than QEMU's mkvenv silently pip-installing one from PyPI (Trixie's meson is new enough)."
    [[stack.component.require]]
    cmd = "pkg-config"
    install = "sudo apt install -y pkg-config"
    note = "pkg-config — used by QEMU's configure (and build-qemu.sh's prerequisite probe) to locate the headless library dependencies."
    [[stack.component.require]]
    check_file = "/usr/include/glib-2.0/glib.h"
    install = "sudo apt install -y libglib2.0-dev"
    note = "libglib2.0-dev — GLib, a mandatory QEMU dependency (headless)."
    [[stack.component.require]]
    check_file = "/usr/include/pixman-1/pixman.h"
    install = "sudo apt install -y libpixman-1-dev"
    note = "libpixman-1-dev — pixman, required by the QEMU softmmu target."
    [[stack.component.require]]
    check_file = "/usr/include/slirp/libslirp.h"
    install = "sudo apt install -y libslirp-dev"
    note = "libslirp-dev — build-time libslirp for QEMU user-mode networking (--enable-slirp); the runtime libslirp0 is declared separately above."
    [[stack.component.require]]
    check_file = "/usr/include/zlib.h"
    install = "sudo apt install -y zlib1g-dev"
    note = "zlib1g-dev — zlib, a mandatory QEMU build dependency."
    [[stack.component.require]]
    check_file = "/usr/include/gcrypt.h"
    install = "sudo apt install -y libgcrypt20-dev"
    note = "libgcrypt20-dev — REQUIRED for the ESP32 machine: the fork gates its RSA/AES accelerator devices (hw/misc/esp32_rsa.c) on `if gcrypt.found()`; without it the esp32 machine aborts at init on 'missing object type misc.esp32.rsa'. build-qemu.sh configures --enable-gcrypt so a missing libgcrypt fails the build loudly."
    [[stack.component.require]]
    # PROVISIONED by the managed setup step (build_steps: scripts/build-qemu.sh into
    # {runtime}/build/tool-cache) — BUILT FROM SOURCE at the pinned Espressif commit, headless (no
    # display/audio), link-gated + hashed before its .lhpc-qemu-built marker is written. Native to this
    # box (a Pi 5 build serves the Pi 5; the Zero builds its own). The pre-check is satisfied when the
    # IN-ROOT binary exists OR qemu-system-xtensa is on PATH (operator override / standalone dev). run.sh
    # receives the resolved binary via the `qemu` param (default below); it keeps its own
    # --qemu > PATH > IDF_TOOLS_PATH fallbacks for standalone use.
    cmd = "qemu-system-xtensa"
    check_file = "{runtime}/build/tool-cache/qemu-xtensa/esp_develop_9.0.0_20240606/qemu/bin/qemu-system-xtensa"
    provisioned = true
    note = "qemu-system-xtensa (headless, built FROM SOURCE at the pinned Espressif commit esp-develop-9.0.0-20240606) — provisioned INTO the runtime root by `lhpc build` (scripts/build-qemu.sh; link-gated, no SDL/GTK/VNC/OpenGL/audio). Satisfied once the in-root binary exists OR qemu-system-xtensa is on PATH."
    [[stack.component.require]]
    # PROVISIONED by the managed setup step (build_steps: a venv at {runtime}/build/tools/platformio),
    # invoked by ABSOLUTE path (PIO=) from prepare-openeth.sh/build.sh — this retires the pipx system
    # dependency. The pre-check is satisfied when the in-root pio exists OR `pio` is on PATH (operator
    # override / standalone pipx). pipx stays the documented standalone-dev alternative (docs/field-notes).
    cmd = "pio"
    check_file = "{runtime}/build/tools/platformio/.venv/bin/pio"
    provisioned = true
    note = "PlatformIO CLI (meshcom firmware build) — provisioned as a managed venv in the runtime root by `lhpc build`; standalone dev may instead `pipx install platformio`. Satisfied once the in-root pio exists OR `pio` is on PATH."

    # MeshCom node callsign (with optional -SSID, e.g. OE1ABC-12); defaults to the
    # operator callsign. Applied via the net-console after boot (see post_start).
    [[stack.component.param]]
    name = "mc_callsign"
    validator = "callsign"
    kind = "str"
    default = "{callsign}"
    label = "MeshCom callsign (with -SSID)"
    # Which firmware image to boot. Switching env needs that image built first

    kind = "enum"
    choices = ["qemu-headless", "qemu-headless-extradio", "qemu-headless-gpsd", "qemu-headless-extradio-gpsd"]
    arg = "--env"
    default = "qemu-headless-extradio-gpsd"
    label = "Firmware env (needs matching build)"
    apply_mode = "build"
    [[stack.component.param]]
    name = "qemu"
    kind = "str"
    validator = "path"
    arg = "--qemu"
    # The MANAGED in-root binary provisioned by build-qemu.sh (headless source build); the operator can
    # override with a custom build. run.sh still falls back to PATH > IDF_TOOLS_PATH standalone (no --qemu).
    default = "{runtime}/build/tool-cache/qemu-xtensa/esp_develop_9.0.0_20240606/qemu/bin/qemu-system-xtensa"
    label = "qemu-system-xtensa path (managed in-root; override for a custom build)"
    advanced = true


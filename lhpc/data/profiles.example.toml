# LoRaHAM Pi Control — confirmed-working profile catalogue (EXAMPLE).
#
# A confirmed-working profile pins the last KNOWN-GOOD state of a component so the
# controller can roll back/repair to it. A failed candidate build/test must NEVER
# overwrite a confirmed profile. Restoration is explicit and auditable — never a
# destructive source reset.
#
# These example entries are placeholders to fix the schema. Real values are
# recorded by the controller after a validated build/test.

[[profile]]
component_id = "loraham-daemon"
commit = "6de866e"                 # tag v111a
daemon_version = "111a"
daemon_tx_profile = "managed-or-direct@{433,868}"
config_schema_version = "unknown"
artifact_id = "build/loraham_daemon@v111a"
tests_passed = ["run_tests.sh (host)"]   # to be confirmed
live_test_status = "not recorded"
compatibility = "Raspberry Pi 3/4/5, Raspberry Pi OS; liblgpio; SPI enabled."
limitations = "Live-RF validation date not yet captured."


# LoRaHAM Pi Control — tracked default settings.
#
# Operator identity and secrets are NOT here — they live only in the runtime-local
# layer (config/local.toml, config/secrets.toml under the runtime root). This file
# is safe to commit.

[web]
host = "127.0.0.1"     # loopback only; non-loopback is rejected by the server
port = 8770
# Background upstream update check (git fetch) inside the web console, so the footer's
# "Update ->" indicator appears without pressing "Check for updates". Hours between
# checks; clamped 1..168; 0 disables the loop (one check at startup still runs).
update_check_hours = 12

[install]
# How `lhpc install` obtains a component's source into the runtime root:
#   "adopt" — copy the operator's locally verified checkout (default here, since
#             the stacks are present and tested locally), then verify the pin.
#   "clone" — git clone the component's remote and check out its pinned commit.
source_strategy = "adopt"
# Where "adopt" looks for existing local checkouts (operator-overridable).
# Local adoption fallback: DISABLED by default (containment — LHPC never reads
# outside the runtime root). When set, the directory MUST lie inside the runtime
# root or every adoption that would use it is refused typed.
adopt_search_root = ""

[operator]
# Filled in only in the runtime-local config/local.toml (never here):
#   callsign = "YOURCALL"

[webserver]
# DESIRED production-webserver configuration (Nginx -> Waitress/Unix-socket -> Flask).
# This is intent only; whether the proxy is actually active/exposed is proven separately
# in state/webserver.json and is never inferred from these values.
bind = "127.0.0.1"          # default loopback; "0.0.0.0" only after explicit remote exposure
port = 8443                 # standard high port (no root / privileged bind required)
# Client-certificate (mTLS) policy. There are NO user accounts — a client cert is a named
# device credential with equal full access. One of:
#   local-open-remote-auth  loopback open; non-loopback requires a valid client cert (default)
#   auth-everywhere         every client (incl. loopback) requires a valid client cert
#   no-auth                 HTTPS only, no client cert anywhere (dangerous when exposed)
access_mode = "local-open-remote-auth"
remote_exposed = false      # remote access is opt-in and stays off until explicitly enabled + proven
# Lists are stored as comma-separated scalars (local.toml is flat-scalar). IPv4 CIDRs only
# for remote allowed sources (IPv6 remote exposure is rejected this milestone; ::1 is local).
allowed_cidrs = ""          # e.g. "192.168.0.0/24" — at least one required before remote exposure
dns_sans = ""               # e.g. "pi.local,lhpc.example" — real hostnames for the server cert
ip_sans = ""                # e.g. "192.168.0.10" — LAN IP SANs (never 0.0.0.0)
server_cert_days = 825      # HTTPS server leaf lifetime (renewed under the same server TLS CA)
client_cert_days = 825      # client/device certificate lifetime
